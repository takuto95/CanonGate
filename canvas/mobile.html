<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CanonGate Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background: #00ddee;
            color: #000;
            border-bottom-right-radius: 0;
        }

        .ego {
            align-self: flex-start;
            background: #2a2a2a;
            border-bottom-left-radius: 0;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #1a1a1a;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #00ddee;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        #status {
            text-align: center;
            font-size: 11px;
            padding: 5px;
            color: #aaa;
            background: #111;
        }
    </style>
</head>

<body>
    <div id="status">Connecting to Canon...</div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="cmd" placeholder="フィットネス報告など..." />
        <button id="send-btn">送信</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('cmd');
        const sendBtn = document.getElementById('send-btn');

        // Replace this with the actual WS tunnel URL
        const wsUrl = 'wss://louisville-survivors-slides-playing.trycloudflare.com';
        let ws;

        function appendMsg(who, text) {
            if (!text) return;
            const d = document.createElement('div');
            d.className = 'msg ' + who;
            d.innerText = text;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Keep only last 50
            if (chatBox.children.length > 50) chatBox.firstChild.remove();
        }

        function connect() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                statusEl.innerText = 'Connected to CanonGate';
                statusEl.style.color = '#0f0';
                appendMsg('ego', '接続しました！フィットネスの報告や雑談などどうぞ。');
            };
            ws.onclose = () => {
                statusEl.innerText = 'Disconnected. Reconnecting...';
                statusEl.style.color = '#f00';
                setTimeout(connect, 3000);
            };
            ws.onerror = () => {
                statusEl.innerText = 'Connection Error.';
            };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'chat' && msg.who === 'ego') {
                        appendMsg('ego', msg.text);
                    }
                } catch (err) { }
            };
        }

        function send() {
            const txt = input.value.trim();
            if (txt && ws && ws.readyState === WebSocket.OPEN) {
                appendMsg('user', txt);
                ws.send(JSON.stringify({ type: 'text_input', text: txt }));
                input.value = '';
            }
        }

        sendBtn.onclick = send;
        input.onkeydown = (e) => { if (e.key === 'Enter') send(); };

        connect();
    </script>
</body>

</html>
