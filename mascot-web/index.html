<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Mascot (LiveMode)</title>
    <style>
        :root {
            --primary: #c084fc;
            /* Soft purple */
            --accent: #f472b6;
            /* Pink */
            --bg-glass: rgba(15, 23, 42, 0.85);
            /* Deeper gray-blue glass */
            --border: rgba(192, 132, 252, 0.4);
            --font: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            cursor: move;
            -webkit-app-region: drag;
            font-family: var(--font);
        }

        /* Glassmorphism Panel Base */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* System Status Bar - Sleek & High-Tech */
        #system-status-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0, 40, 80, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            z-index: 2000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary);
            -webkit-app-region: drag;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Hub Notification - Cyber-Toast */
        #hub-toast {
            position: fixed;
            top: 45px;
            right: 15px;
            width: 280px;
            padding: 12px;
            color: white;
            z-index: 2100;
            transform: translateX(350px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            -webkit-app-region: no-drag;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #hub-toast.show {
            transform: translateX(0);
        }

        #hub-toast .icon {
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #hub-toast .content {
            font-size: 13px;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Chat Container - Thought Stream Style */
        #chat-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-height: 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
            padding: 15px;
            overflow-y: auto;
            pointer-events: auto;
            -webkit-app-region: no-drag;
        }

        .chat-log-item {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #fff;
            max-width: 85%;
        }

        #hud-content {
            position: fixed;
            top: 45px;
            right: 15px;
            width: 240px;
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border-radius: 14px;
            z-index: 1000;
            font-size: 12px;
            color: #f1f5f9;
            pointer-events: auto;
            -webkit-app-region: no-drag;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        #hud-content::-webkit-scrollbar {
            width: 4px;
        }

        #hud-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        #hud-content:hover {
            box-shadow: 0 0 15px var(--border);
            transform: scale(1.02);
        }

        .task-item {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.3s ease-out;
            cursor: pointer;
            transition: background 0.2s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .task-item.user_decision {
            border-left: 3px solid #fbbf24;
            color: #fde047;
        }

        .task-item.ego_running {
            border-left: 3px solid #22d3ee;
            color: #67e8f9;
        }

        .task-item.user_running {
            border-left: 3px solid #f8fafc;
            color: #f8fafc;
        }

        .task-item.needs_org {
            color: #aaa;
            font-style: italic;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .refresh-btn {
            background: rgba(192, 132, 252, 0.1);
            border: 1px solid rgba(192, 132, 252, 0.2);
            color: var(--primary);
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: rgba(192, 132, 252, 0.2);
            transform: rotate(90deg);
        }

        .refresh-btn:active {
            transform: scale(0.9);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Area - Integrated HUD */
        #input-area {
            position: fixed;
            bottom: 15px;
            left: 5%;
            width: 90%;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1001;
            padding: 0 15px;
            pointer-events: auto;
            -webkit-app-region: no-drag;
        }

        #input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            background: linear-gradient(135deg, var(--primary), #0088ff);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            cursor: pointer;
        }

        #send-btn:hover {
            transform: scale(1.1);
        }

        #controls {
            position: fixed;
            top: 5px;
            right: 10px;
            z-index: 2001;
        }

        #min-btn {
            color: var(--primary);
            cursor: pointer;
            -webkit-app-region: no-drag;
            font-size: 14px;
            display: none;
            /* redundant with status bar one */
        }
    </style>
</head>

<body>
    <div id="start-prompt">
        <div style="font-size: 20px;">Canon Mascot</div>
        <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">音声連携を開始するにはボタンを押してください</div>
        <button id="start-btn">カノンを起動</button>
    </div>

    <!-- System Cockpit HUD -->
    <div id="system-status-bar">
        <div class="status-dot"></div>
        <span id="status-text">Canon Core: Online | Mode: Mascot</span>
        <div style="flex:1"></div>
        <button id="audio-toggle-btn"
            style="background:none; border: 1px solid var(--primary); color:var(--primary); font-size:9px; padding:2px 6px; cursor:pointer;-webkit-app-region:no-drag; border-radius:4px; margin-right:5px;">🔊
            ON</button>
        <button id="mode-switch-btn"
            style="background:none; border: 1px solid var(--primary); color:var(--primary); font-size:9px; padding:2px 6px; cursor:pointer;-webkit-app-region:no-drag; border-radius:4px; margin-right:10px;">➔
            Simple Mode</button>
        <div id="min-btn-bar" style="cursor:pointer;-webkit-app-region:no-drag; margin-right:5px;">－</div>
    </div>

    <div id="hub-toast" class="glass-panel">
        <div class="icon">🔔</div>
        <div class="content">新しい通知があります</div>
    </div>

    <!-- UI Overlay (Bottom) -->
    <div id="ui-overlay" style="display:none">Waiting for Brain...</div>

    <!-- System Cockpit HUD -->
    <!-- System Cockpit HUD (Hidden as redundant with main dashboard) -->
    <div id="hud-content" style="display: none;">
        <div class="hud-header">
            <span>TASK RADAR 🛰️</span>
        </div>
        <div id="task-list"></div>
    </div>

    <!-- Chat Log UI -->
    <div id="chat-container" class="glass-panel">
        <!-- Logs will be added here -->
    </div>

    <!-- Input Area UI -->
    <div id="input-area" class="glass-panel">
        <input id="input-field" type="text" placeholder="メッセージを入力..." />
        <button id="send-btn">➤</button>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div id="min-btn">－</div>
    </div>

    <div id="canvas-container"></div>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let currentVrm = null;
        let mouthOpen = 0.0;
        let ws = null;
        let currentEmotion = 'neutral';
        let isAudioMuted = false;

        // --- UI Elements ---
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');
        const minBtn = document.getElementById('min-btn');

        // Audio Context for playback & analysis
        let audioCtx_playback = null;
        let audioAnalyzer_playback = null;

        function setupWebAudio() {
            if (!audioCtx_playback) {
                audioCtx_playback = new (window.AudioContext || window.webkitAudioContext)();
                audioAnalyzer_playback = audioCtx_playback.createAnalyser();
                audioAnalyzer_playback.fftSize = 256;
            }
            if (audioCtx_playback.state === 'suspended') {
                audioCtx_playback.resume();
            }
        }

        async function playAudio(base64Data) {
            setupWebAudio();
            if (isAudioMuted) {
                console.log("Audio is muted, skipping playback.");
                return;
            }
            // P0: Queueing to prevent duplicated/overlapping voices from multiple fragments
            audioQueue.push(base64Data);
            if (!isAudioPlaying) {
                processAudioQueue();
            }
        }

        async function processAudioQueue() {
            if (audioQueue.length === 0) {
                isAudioPlaying = false;
                return;
            }

            isAudioPlaying = true;
            const base64Data = audioQueue.shift();

            try {
                // Determine format
                let binaryString;
                try {
                    binaryString = window.atob(base64Data);
                } catch (e) {
                    // Fallback for some base64 formats
                    binaryString = window.atob(base64Data.split(',')[1] || base64Data);
                }

                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const audioBuffer = await audioCtx_playback.decodeAudioData(bytes.buffer);
                const source = audioCtx_playback.createBufferSource();
                source.buffer = audioBuffer;

                source.connect(audioAnalyzer_playback);
                audioAnalyzer_playback.connect(audioCtx_playback.destination);

                source.onended = () => {
                    processAudioQueue();
                };

                source.start(0);
            } catch (e) {
                console.error("Audio Playback Error", e);
                isAudioPlaying = false;
                setTimeout(processAudioQueue, 500); // Backoff and retry next
            }
        }

        function getPlaybackVolume() {
            if (!audioAnalyzer_playback) return 0;
            const data = new Uint8Array(audioAnalyzer_playback.frequencyBinCount);
            audioAnalyzer_playback.getByteFrequencyData(data);
            let sum = 0;
            // Focus on vocal range roughly
            for (let i = 0; i < data.length; i++) sum += data[i];
            return sum / data.length;
        }

        function addLog(text, role) {
            const log = document.createElement('div');
            log.textContent = text;
            log.className = 'chat-log-item';
            log.style.background = role === 'user' ? 'rgba(0,120,255,0.6)' : 'rgba(255,80,120,0.6)';
            log.style.alignSelf = role === 'user' ? 'flex-end' : 'flex-start';

            chatContainer.appendChild(log);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            while (chatContainer.children.length > 20) chatContainer.removeChild(chatContainer.firstChild);
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            if (!list) return;
            list.innerHTML = '';
            tasks.forEach(t => {
                const item = document.createElement('div');
                item.className = `task-item ${t.category || ''}`;
                item.innerHTML = `
                    <div style="font-weight:600; font-size: 11px; line-height:1.2;">${t.title}</div>
                `;
                list.appendChild(item);
            });
        }

        const sendText = () => {
            const text = inputField.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'text_input', text: text }));
                inputField.value = '';
                addLog(text, 'user');
            }
        };

        sendBtn.addEventListener('click', sendText);
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendText();
            e.stopPropagation();
        });

        function setupWebSocket() {
            const wsHost = (window.location.protocol === 'file:') ? 'localhost' : window.location.hostname;
            ws = new WebSocket('ws://' + wsHost + ':8082');

            ws.onopen = () => {
                console.log('Connected to Canon Brain');
                const overlay = document.getElementById('ui-overlay');
                if (overlay) { overlay.textContent = 'Connected: Brain Online'; overlay.style.color = '#c084fc'; }
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'user_text') {
                        addLog(msg.text, 'user');
                    }
                    else if (msg.type === 'audio') {
                        playAudio(msg.data);
                        if (msg.text) addLog(msg.text, 'ai');
                        if (msg.emotion) {
                            currentEmotion = msg.emotion;
                            setTimeout(() => { currentEmotion = 'neutral'; }, 3000);
                        }
                    }
                    else if (msg.type === 'hub_alert') {
                        const tag = msg.tag;
                        const text = msg.text;
                        if (tag === "[PATROL]" || tag === "[SYSTEM_REPORT]" || tag === "[ALIVE_ISSUE]") {
                            currentEmotion = 'patrol';
                            setTimeout(() => { currentEmotion = 'neutral'; }, 10000);
                        }
                        showHubToast(tag, text);
                    }
                    else if (msg.type === 'tasks') {
                        renderTasks(msg.tasks);
                    }
                } catch (e) { console.error('WS Error:', e); }
            };

            const toast = document.getElementById('hub-toast');
            function showHubToast(tag, text) {
                if (!toast) return;
                const iconMap = {
                    "[URGENT]": "🚨",
                    "[SLACK]": "📬",
                    "[GITHUB]": "⚙️",
                    "[DEVIN]": "🤖",
                    "[ALERT]": "⚠️",
                    "[FINANCE]": "💰",
                    "[SYSTEM_REPORT]": "📊",
                    "[PATROL]": "🔍",
                    "[ALIVE_ISSUE]": "🧠"
                };
                toast.querySelector('.icon').textContent = iconMap[tag] || "🔔";
                toast.querySelector('.content').textContent = text;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 6000);
            }

            ws.onclose = () => {
                console.log('Disconnected');
                const overlay = document.getElementById('ui-overlay');
                if (overlay) { overlay.textContent = 'Disconnected: Waiting for Brain...'; overlay.style.color = 'red'; }
                setTimeout(setupWebSocket, 2000);
            };
        }

        // --- Three.js Setup ---
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.0, 1.8);
        camera.lookAt(0, 0.9, 0);

        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser, { autoUpdateHumanoid: true }));

        function loadVRM(url) {
            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                if (!vrm) { console.error('VRM not found in loaded file'); return; }
                VRMUtils.removeUnnecessaryVertices(gltf.scene);
                VRMUtils.removeUnnecessaryJoints(gltf.scene);
                vrm.scene.traverse((obj) => { obj.frustumCulled = false; });
                if (currentVrm) {
                    scene.remove(currentVrm.scene);
                    VRMUtils.deepDispose(currentVrm.scene);
                }
                // Fix orientation (remove PI rotation)
                vrm.scene.rotation.y = 0;
                // Move camera down slightly if needed, but let's just use default pose
                scene.add(vrm.scene);
                currentVrm = vrm;
                console.log('VRM Loaded');
            }, undefined, (err) => {
                console.error('VRM load failed:', err);
                console.info('Run DownloadVrmModel.bat or place test.vrm in mascot-web/');
            });
        }

        // Interactions / Auto-Start
        const startPrompt = document.getElementById('start-prompt');
        // Hide prompt if inside iframe
        if (window.parent !== window) {
            startPrompt.style.display = 'none';
            // Phase 4.1: Hide standalone Mascot UI elements because they overlap with the main HUD
            const hideIds = ['system-status-bar', 'hub-toast', 'chat-container', 'input-area', 'controls'];
            hideIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });

            // Start automatically
            setTimeout(() => {
                setupWebAudio();
                setupWebSocket();
                loadVRM('./test.vrm');
            }, 500);

            // Listen for click from parent to resume audio
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'resume_audio') {
                    if (audioCtx_playback && audioCtx_playback.state === 'suspended') {
                        audioCtx_playback.resume();
                    }
                }
            });
        } else {
            document.getElementById('start-btn').addEventListener('click', () => {
                setupWebAudio();
                setupWebSocket();
                startPrompt.style.display = 'none';
                loadVRM('./test.vrm');
            });
        }

        // Drag Rotate
        let isDragging = false;
        let prevX = 0;
        document.addEventListener('mousedown', (e) => { isDragging = true; prevX = e.clientX; });
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging && currentVrm) {
                currentVrm.scene.rotation.y += (e.clientX - prevX) * 0.01;
                prevX = e.clientX;
            }
        });

        // Animation Loop
        const clock = new THREE.Clock();
        // State variables for animation (currentConfirm, etc) - keeping minimal here for brevity but need to ensure variables exist
        // Define them at top level? No, they were local inside script. Restoring them.
        let currentConfirm = 0.0, targetConfirm = 0.0;
        let currentSorrow = 0.0, targetSorrow = 0.0;
        let currentTilt = 0.0, targetTilt = 0.0;
        let currentJump = 0.0, targetJump = 0.0;
        let currentLean = 0.0, targetLean = 0.0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            if (currentVrm) {
                try {
                    currentVrm.update(delta);

                    const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
                    const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
                    if (spine) spine.rotation.x = Math.sin(elapsed * 1.5) * 0.02;

                    // Idle & Gesture Posing
                    const humanoid = currentVrm.humanoid;
                    const leftUpperArm = humanoid.getNormalizedBoneNode('leftUpperArm');
                    const rightUpperArm = humanoid.getNormalizedBoneNode('rightUpperArm');

                    const vol = getPlaybackVolume();
                    const mouthVal = Math.min(1.0, vol / 30.0);

                    if (leftUpperArm) {
                        // Default Down (-1.35), Sway (+/- 0.03), Gesture during talk (mouthVal)
                        leftUpperArm.rotation.z = -1.35 + Math.sin(elapsed * 0.8) * 0.03 + (mouthVal * 0.2);
                        leftUpperArm.rotation.x = (mouthVal * 0.4);
                    }
                    if (rightUpperArm) {
                        // Default Down (1.35), Sway (+/- 0.03), Gesture during talk (mouthVal)
                        rightUpperArm.rotation.z = 1.35 - Math.sin(elapsed * 0.8) * 0.03 - (mouthVal * 0.2);
                        rightUpperArm.rotation.x = (mouthVal * 0.4);
                    }

                    // Add Left/Right Forearm and Hands to prevent straight line arms
                    const leftLowerArm = humanoid.getNormalizedBoneNode('leftLowerArm');
                    const rightLowerArm = humanoid.getNormalizedBoneNode('rightLowerArm');
                    if (leftLowerArm) leftLowerArm.rotation.y = 0.4;
                    if (rightLowerArm) rightLowerArm.rotation.y = -0.4;

                    // Leg alignment
                    const leftLowerLeg = currentVrm.humanoid.getNormalizedBoneNode('leftLowerLeg');
                    const rightLowerLeg = currentVrm.humanoid.getNormalizedBoneNode('rightLowerLeg');
                    if (leftLowerLeg) leftLowerLeg.rotation.x = -0.1;
                    if (rightLowerLeg) rightLowerLeg.rotation.x = -0.1;

                    // Dynamic Animation based on AI state
                    if (currentEmotion === 'happy') {
                        targetConfirm = 1.0; targetSorrow = 0.0;
                        targetTilt = Math.sin(elapsed * 3.0) * 0.05; targetJump = Math.abs(Math.sin(elapsed * 5.0) * 0.1);
                    } else if (currentEmotion === 'sad') {
                        targetConfirm = 0.0; targetSorrow = 1.0; targetTilt = 0.0; targetJump = 0.0;
                    } else if (currentEmotion === 'patrol') {
                        // Kyorokyoro (looking around)
                        targetTilt = Math.sin(elapsed * 1.0) * 0.1;
                        if (neck) neck.rotation.y = Math.sin(elapsed * 2.0) * 0.2;
                    } else if (currentEmotion === 'question') {
                        targetTilt = 0.15; targetLean = 0.3;
                    } else {
                        targetConfirm = 0.0; targetSorrow = 0.0; targetTilt = 0.0; targetJump = 0.0; targetLean = 0.0;
                    }

                    const speed = 3.0 * delta;
                    currentConfirm += (targetConfirm - currentConfirm) * speed;
                    currentSorrow += (targetSorrow - currentSorrow) * speed;
                    currentTilt += (targetTilt - currentTilt) * speed;
                    currentJump += (targetJump - currentJump) * speed;
                    currentLean += (targetLean - currentLean) * speed;

                    const em = currentVrm.expressionManager;
                    em.setValue('happy', currentConfirm);
                    em.setValue('sorrow', currentSorrow);

                    if (Math.sin(elapsed * 0.2) > 0.98) em.setValue('blink', 1.0);
                    else em.setValue('blink', 0.0);

                    currentVrm.scene.position.y = currentJump;
                    currentVrm.scene.position.z = currentLean;

                    // Use existing mouthVal calculated above
                    em.setValue('aa', mouthVal);

                    if (neck) {
                        let baseNod = Math.sin(elapsed * 0.5) * 0.02;
                        if (currentEmotion === 'sad') baseNod = 0.2;
                        neck.rotation.y = baseNod + mouthVal * 0.05;
                        neck.rotation.z = currentTilt;
                    }
                } catch (e) { console.warn("Anim Error", e); }
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Min Button & Mode Switch (Safe Require)
        try {
            const electron = window.require ? window.require('electron') : null;
            if (electron) {
                const { ipcRenderer } = electron;

                // Existing minimize (updated ID)
                const minBar = document.getElementById('min-btn-bar');
                if (minBar) minBar.addEventListener('click', () => ipcRenderer.send('minimize-window'));

                // New Mode Switch
                const modeBtn = document.getElementById('mode-switch-btn');
                if (modeBtn) modeBtn.addEventListener('click', () => ipcRenderer.send('change-mode', 'simple'));

                if (minBtn) minBtn.addEventListener('click', () => ipcRenderer.send('minimize-window'));
            } else {
                minBtn.style.display = 'none';
            }
        } catch (e) {
            console.log('Not running in Electron or require failed:', e);
            minBtn.style.display = 'none';
        }

        // --- Audio Toggle Logic ---
        const audioBtn = document.getElementById('audio-toggle-btn');
        if (audioBtn) {
            audioBtn.addEventListener('click', () => {
                isAudioMuted = !isAudioMuted;
                audioBtn.textContent = isAudioMuted ? '🔇 OFF' : '🔊 ON';
                audioBtn.style.borderColor = isAudioMuted ? '#ef4444' : 'var(--primary)';
                audioBtn.style.color = isAudioMuted ? '#ef4444' : 'var(--primary)';

                if (isAudioMuted && audioCtx_playback) {
                    // Optional: Stop current playing audio immediately if muted
                    // (Implementation depends on if we want to kill current buffer source)
                }
            });
        }

    </script>
