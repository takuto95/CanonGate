<style>
    body {
        margin: 0;
        padding: 0;
        background: #0a0a0b;
        color: #e0e0e0;
        font-family: 'Inter', -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    #header {
        padding: 15px;
        background: rgba(20, 20, 25, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .title {
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(90deg, #00ddee, #0077ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #metrics-bar {
        padding: 10px 15px;
        background: rgba(30, 30, 40, 0.5);
        display: flex;
        gap: 15px;
        font-size: 11px;
        overflow-x: auto;
        white-space: nowrap;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .metric-item {
        display: flex;
        flex-direction: column;
    }

    .metric-label {
        color: #888;
        margin-bottom: 2px;
    }

    .metric-value {
        color: #00ddee;
        font-family: monospace;
        font-weight: bold;
    }

    #main-content {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    #chat-box {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    #task-list {
        padding: 15px;
        background: rgba(0, 0, 0, 0.2);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .section-title {
        font-size: 12px;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .task-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .task-title {
        flex: 1;
        margin-right: 10px;
    }

    .task-btn {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 10px;
        border: none;
        cursor: pointer;
        background: #333;
        color: #ccc;
    }

    .task-btn.approve {
        background: #008855;
        color: #fff;
    }

    .task-btn.execute {
        background: #0077ff;
        color: #fff;
    }

    .msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        position: relative;
    }

    .msg.user {
        align-self: flex-end;
        background: linear-gradient(135deg, #0077ff, #0055cc);
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .msg.ego {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        border-bottom-left-radius: 4px;
    }

    #input-area {
        display: flex;
        padding: 15px;
        background: rgba(20, 20, 25, 0.95);
        gap: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
    }

    input[type="text"] {
        flex: 1;
        padding: 12px 18px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        outline: none;
        font-size: 14px;
    }

    input[type="text"]:focus {
        border-color: #00ddee;
        background: rgba(0, 221, 238, 0.05);
    }

    #send-btn {
        width: 44px;
        height: 44px;
        border-radius: 22px;
        border: none;
        background: #00ddee;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    #status {
        text-align: center;
        font-size: 10px;
        padding: 4px;
        color: #666;
        background: #000;
    }
</style>
</head>

<body>
    <div id="status">Connecting to Canon...</div>
    <div id="header">
        <div class="title">CanonHub Mobile</div>
        <div id="connection-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #555;"></div>
    </div>
    <div id="metrics-bar">
        <div class="metric-item">
            <span class="metric-label">LLM</span>
            <span class="metric-value" id="val-llm">0.0s</span>
        </div>
        <div class="metric-item">
            <span class="metric-label">STT</span>
            <span class="metric-value" id="val-stt">0.0s</span>
        </div>
        <div class="metric-item">
            <span class="metric-label">RAG</span>
            <span class="metric-value" id="val-rag">0.0s</span>
        </div>
        <div class="metric-item">
            <span class="metric-label">Apps</span>
            <span class="metric-value" id="val-app">0%</span>
        </div>
        <div class="metric-item">
            <span class="metric-label">Inf</span>
            <span class="metric-value" id="val-inf">0</span>
        </div>
    </div>
    <div id="main-content">
        <div id="chat-box"></div>
        <div id="task-list">
            <div class="section-title">Next Actions</div>
            <div id="task-container"></div>
        </div>
    </div>
    <div id="input-area">
        <input type="text" id="cmd" placeholder="メッセージを入力..." />
        <button id="send-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
        </button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const connDot = document.getElementById('connection-dot');
        const chatBox = document.getElementById('chat-box');
        const taskContainer = document.getElementById('task-container');
        const input = document.getElementById('cmd');
        const sendBtn = document.getElementById('send-btn');

        const m_llm = document.getElementById('val-llm');
        const m_stt = document.getElementById('val-stt');
        const m_rag = document.getElementById('val-rag');
        const m_app = document.getElementById('val-app');
        const m_inf = document.getElementById('val-inf');

        // Note: Set this to your actual tunnel or local URL
        const wsUrl = 'wss://louisville-survivors-slides-playing.trycloudflare.com';
        let ws;

        function appendMsg(who, text) {
            if (!text) return;
            const d = document.createElement('div');
            d.className = 'msg ' + who;
            d.innerText = text;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (chatBox.children.length > 30) chatBox.firstChild.remove();
        }

        function updateTasks(tasks) {
            taskContainer.innerHTML = '';
            tasks.forEach(task => {
                if (task.category === 'completed') return;
                const d = document.createElement('div');
                d.className = 'task-card';

                let btnHtml = '';
                if (task.category === 'user_decision') {
                    btnHtml = `<button class="task-btn approve" onclick="sendAction('task_approve', '${task.id}')">承認</button>`;
                } else {
                    btnHtml = `<button class="task-btn execute" onclick="sendAction('task_execute', '${task.id}')">実行</button>`;
                }

                d.innerHTML = `
                    <div class="task-title">${task.title}</div>
                    ${btnHtml}
                `;
                taskContainer.appendChild(d);
            });
        }

        function updateMetrics(m) {
            m_llm.innerText = m.llm_avg.toFixed(1) + 's';
            m_stt.innerText = m.stt_avg.toFixed(1) + 's';
            m_rag.innerText = m.rag_avg.toFixed(1) + 's';
            const rate = m.total_calls > 0 ? (m.approvals / m.total_calls * 100).toFixed(0) : 0;
            m_app.innerText = rate + '%';
            m_inf.innerText = m.total_calls;
        }

        function connect() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                statusEl.innerText = 'ONLINE';
                statusEl.style.color = '#00ddee';
                connDot.style.background = '#00ddee';
                appendMsg('ego', 'CanonHubへようこそ！現在の状態を表示中だよ。');
            };
            ws.onclose = () => {
                statusEl.innerText = 'OFFLINE - Reconnecting...';
                connDot.style.background = '#f00';
                setTimeout(connect, 3000);
            };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'chat' && msg.who === 'ego') {
                        appendMsg('ego', msg.text);
                    } else if (msg.type === 'metrics') {
                        updateMetrics(msg.metrics);
                    } else if (msg.type === 'tasks') {
                        updateTasks(msg.tasks);
                    }
                } catch (err) { }
            };
        }

        function send() {
            const txt = input.value.trim();
            if (txt && ws && ws.readyState === WebSocket.OPEN) {
                appendMsg('user', txt);
                ws.send(JSON.stringify({ type: 'text_input', text: txt }));
                input.value = '';
            }
        }

        function sendAction(type, taskId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: type, task_id: taskId }));
            }
        }

        sendBtn.onclick = send;
        input.onkeydown = (e) => { if (e.key === 'Enter') send(); };

        connect();
    </script>
</body>

</html>
