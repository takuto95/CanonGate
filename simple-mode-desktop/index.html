<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EgoGate HUD v2.1</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="hud-container">
    <!-- Window Controls (Minimalist) -->
    <div class="win-ctrl">
      <button id="min-btn">ー</button>
      <button id="max-btn">▢</button>
      <button id="close-btn">×</button>
    </div>

    <!-- Top Info Grid (Faint) -->
    <header class="hud-header">
      <div class="hud-stat"><span class="label">CORE</span><span class="value online">ONL</span></div>
      <div class="hud-stat"><span class="label">LINK</span><span class="value active">LNK</span></div>
      <div class="hud-stat"><span class="label">SYNC</span><span class="value pulsed">PUL</span></div>
    </header>

    <!-- Main HUD Viewport -->
    <main class="hud-viewport">
      <!-- The HUD Core & Rings -->
      <div class="egogate-core">
        <div class="hud-ring r1"></div>
        <div class="hud-ring r2"></div>
        <div class="hud-ring r3"></div>
        <div class="ego-orb idle" id="egoOrb"></div>

        <!-- Satellite Nodes (Hidden by default) -->
        <div class="satellite-container" id="satelliteDock">
          <div class="sat-node" id="btn-canvas" style="--angle: -135deg;">
            <div class="node-inner" title="Canvas (Shift+C)">C</div>
            <span class="node-label">CANVAS</span>
          </div>
          <div class="sat-node" id="btn-hub" style="--angle: -45deg;">
            <div class="node-inner" title="Hub (Shift+H)">H</div>
            <span class="node-label">HUB</span>
          </div>
          <div class="sat-node" id="btn-report" style="--angle: 45deg;">
            <div class="node-inner" title="Report (Shift+R)">R</div>
            <span class="node-label">REPORT</span>
          </div>
          <div class="sat-node" id="btn-log" style="--angle: 135deg;">
            <div class="node-inner" title="Logs (Shift+L)">L</div>
            <span class="node-label">LOGS</span>
          </div>
        </div>
      </div>

      <div class="hud-state-label" id="stateLabel">LINK STABLE</div>
    </main>

    <!-- Contextual Command Bar -->
    <div class="hud-command-bar" id="commandArea">
      <input type="text" id="commandInput" placeholder="> COMMAND_INPUT..." autocomplete="off">
    </div>

    <!-- Hex Menu Trigger -->
    <div class="hex-trigger" id="hexMenuBtn" title="HUD System (Menu)">
      <div class="hex-icon">
        <svg viewBox="0 0 100 100">
          <path d="M50 5 L89 27.5 L89 72.5 L50 95 L11 72.5 L11 27.5 Z" fill="none" stroke="currentColor"
            stroke-width="4" />
          <circle cx="50" cy="50" r="10" fill="currentColor" />
        </svg>
      </div>
    </div>

    <!-- Audio Unlock (Essential) -->
    <button id="audioUnlockBtn" class="audio-unlock">UNSYNCED_AUDIO</button>

    <!-- App Panels (Overlays) -->
    <div id="overlay-container" class="overlay-container">
      <div id="panel-log" class="hud-panel">
        <div class="panel-header"><span>THOUGHT_LOG</span> <button class="panel-close">×</button></div>
        <div class="panel-content chat-scroll" id="logContent"></div>
      </div>

      <div id="panel-report" class="hud-panel">
        <div class="panel-header"><span>PATROL_REPORT</span> <button class="panel-close">×</button></div>
        <div class="panel-content patrol-scroll" id="patrolPeekContent"></div>
        <div class="panel-footer"><button id="report-history-btn" class="ctrl-btn-sm">FULL_HISTORY</button></div>
      </div>

      <div id="panel-hub" class="hud-panel">
        <div class="panel-header"><span>AGENT_HUB</span> <button class="panel-close">×</button></div>
        <div class="panel-content" id="hubContent">
          <div class="agent-grid">
            <div class="agent-card active"><span class="icon">👑</span><strong>Commander</strong></div>
            <div class="agent-card"><span class="icon">⚙️</span><strong>Coder</strong></div>
          </div>
        </div>
      </div>

      <div id="panel-canvas" class="hud-panel">
        <div class="panel-header"><span>WORKSPACE_CANVAS</span> <button class="panel-close">×</button></div>
        <div class="panel-content" id="canvasContent">Initializing workspace...</div>
      </div>
    </div>

    <!-- Alert Toast -->
    <div id="hub-toast-simple">
      <div class="icon">!</div>
      <div class="content">ALERT</div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      const WS_PORT = 8080;
      const egoOrb = document.getElementById('egoOrb');
      const stateLabel = document.getElementById('stateLabel');
      const logContent = document.getElementById('logContent');
      const audioUnlockBtn = document.getElementById('audioUnlockBtn');
      const hubToast = document.getElementById('hub-toast-simple');
      const hexBtn = document.getElementById('hexMenuBtn');
      const satDock = document.getElementById('satelliteDock');
      const cmdArea = document.getElementById('commandArea');
      const cmdInput = document.getElementById('commandInput');

      let ws = null;
      let audioUnlocked = false;
      let isPlaying = false;
      let audioQueue = [];
      let audioEl = null;
      let reconnectAttempts = 0;

      // HUD Logic: Reveal Menu
      hexBtn.onclick = () => {
        satDock.classList.toggle('active');
        cmdArea.classList.toggle('active');
        hexBtn.classList.toggle('active');
      };

      // Panel Navigation
      const panels = {
        'btn-canvas': 'panel-canvas',
        'btn-hub': 'panel-hub',
        'btn-report': 'panel-report',
        'btn-log': 'panel-log'
      };

      const overlay = document.getElementById('overlay-container');

      Object.keys(panels).forEach(btnId => {
        document.getElementById(btnId).onclick = () => {
          const panelId = panels[btnId];
          const panel = document.getElementById(panelId);
          const wasActive = panel.classList.contains('active');

          document.querySelectorAll('.hud-panel').forEach(p => p.classList.remove('active'));
          overlay.classList.remove('active');

          if (!wasActive) {
            overlay.classList.add('active');
            panel.classList.add('active');
          }
        };
      });

      document.querySelectorAll('.panel-close').forEach(btn => {
        btn.onclick = () => {
          overlay.classList.remove('active');
          document.querySelectorAll('.hud-panel').forEach(p => p.classList.remove('active'));
        };
      });

      // WebSocket & State (Core logic preserved)
      function setState(s) {
        egoOrb.className = 'ego-orb ' + s;
        document.querySelector('.egogate-core').className = 'egogate-core ' + s;
        const labels = {
          idle: 'LINK STABLE', listening: 'SYSTEM LISTENING',
          speaking: 'EGO TRANSMITTING', connected: 'NEURAL SYNC ON',
          off: 'CORE OFFLINE', muted: 'VOICE BYPASS',
          reconnecting: 'RE-SYNCING...', error: 'PULSE FAILURE'
        };
        stateLabel.textContent = labels[s] || s.toUpperCase();
      }

      function appendLog(who, text) {
        if (!text) return;
        const div = document.createElement('div');
        div.className = 'msg ' + who;
        div.textContent = text;
        logContent.appendChild(div);
        logContent.scrollTop = logContent.scrollHeight;
      }

      function connect() {
        ws = new WebSocket('ws://127.0.0.1:' + WS_PORT);
        ws.onopen = () => { appendLog('ego', 'EGOGATE.sync(completed)'); setState('idle'); };
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'audio') {
            audioQueue.push({ base64: msg.data });
            if (msg.text) appendLog('ego', msg.text);
            tryPlayNext();
          } else if (msg.type === 'user_text') {
            appendLog('user', msg.text);
            setState('listening');
            setTimeout(() => { if (!isPlaying) setState('idle'); }, 2000);
          } else if (msg.type === 'hub_alert') {
            appendLog('ego', `[${msg.tag}] ${msg.text}`);
          }
        };
        ws.onclose = () => { setState('reconnecting'); setTimeout(connect, 3000); };
      }

      function tryPlayNext() {
        if (isPlaying || audioQueue.length === 0 || !audioUnlocked) return;
        const item = audioQueue.shift();
        if (!audioEl) {
          audioEl = new Audio();
          audioEl.onended = () => { isPlaying = false; tryPlayNext(); if (audioQueue.length === 0) setState('idle'); };
        }
        const blob = new Blob([Uint8Array.from(atob(item.base64), c => c.charCodeAt(0))], { type: 'audio/mpeg' });
        audioEl.src = URL.createObjectURL(blob);
        isPlaying = true;
        setState('speaking');
        audioEl.play();
      }

      cmdInput.onkeydown = (e) => {
        if (e.key === 'Enter') {
          const txt = cmdInput.value.trim();
          if (txt && ws && ws.readyState === 1) {
            appendLog('user', txt);
            ws.send(JSON.stringify({ type: 'text_input', text: txt }));
            cmdInput.value = '';
          }
        }
      };

      audioUnlockBtn.onclick = () => { audioUnlocked = true; audioUnlockBtn.style.display = 'none'; new Audio().play(); tryPlayNext(); };

      // Electron IPC
      try {
        const electron = window.require ? window.require('electron') : null;
        if (electron) {
          const { ipcRenderer } = electron;
          document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-window');
          document.getElementById('max-btn').onclick = () => ipcRenderer.send('maximize-window');
          document.getElementById('close-btn').onclick = () => window.close();
        }
      } catch (e) { }

      connect();
    })();
  </script>
</body>

</html>
