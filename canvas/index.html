<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CanonGate - LiveCanvas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui-overlay">
        <div id="status">Connecting to CanonGate...</div>
        <div id="tools">
            <button id="btn-draw" class="active">Draw</button>
            <button id="btn-erase">Erase</button>
            <button id="btn-clear">Clear</button>
            <input type="color" id="color-picker" value="#00ddee">
            <input type="range" id="size-picker" min="1" max="50" value="5">
        </div>
        <div id="prompt-area">
            <input type="text" id="prompt-input" placeholder="Prompt for generation (e.g. girl looking up at sky)">
            <button id="btn-generate">GENERATE</button>
        </div>
    </div>
    
    <div id="canvas-container">
        <!-- AI generated background layer -->
        <canvas id="bg-canvas"></canvas>
        <!-- User drawing layer -->
        <canvas id="draw-canvas"></canvas>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
