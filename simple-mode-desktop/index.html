<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CanonGate HUD</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="hud-container">
    <div class="win-ctrl">
      <button id="min-btn">ー</button>
      <button id="max-btn">▢</button>
      <button id="close-btn">×</button>
    </div>

    <!-- 
    <header class="hud-header">
       ... (Hidden as requested) ...
    </header> 
    -->

    <div class="hud-main-layout">
      <!-- Left: Intelligence Stream -->
      <aside class="hud-wing left-wing">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 15px;">INTELLIGENCE_STREAM</div>
        <div class="stream-filters">
          <button class="filter-btn active" onclick="setFilter('all')">全て</button>
          <button class="filter-btn" onclick="setFilter('chat')">対話</button>
          <button class="filter-btn" onclick="setFilter('soliloquy')">独り言</button>
          <button class="filter-btn" onclick="setFilter('patrol')">巡回</button>
        </div>
        <div id="chatStream" class="chat-stream"></div>
        <div id="thoughtStream" class="thought-stream"></div>
      </aside>

      <!-- Center: Avatar Core -->
      <main class="center-core">
        <div class="avatar-frame" id="avatarFrame">
          <iframe id="mascotFrame" src="../mascot-web/index.html?mode=viewer" frameborder="0" scrolling="no"
            style="width:100%; height:100%; border:none; pointer-events: none;"></iframe>
        </div>
        <div style="font-size: 11px; letter-spacing: 4px; color: var(--neon-cyan); opacity: 0.7;">CANON_SYSTEM</div>
        <div class="hud-command-area" style="flex-direction: column;">
          <div class="voice-wave-container" id="voiceWave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
            <button class="mic-btn" id="micBtn">
              <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                  d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
              </svg>
            </button>
            <input type="text" id="commandInput" placeholder="ENTER_COMMAND_OR_VOICE..." autocomplete="off">
          </div>
        </div>
      </main>

      <!-- Right: Mission/Task Dash -->
      <aside class="hud-wing right-wing">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">MISSION_RADAR</div>
          <div class="stream-filters" style="margin-bottom: 0; display: flex; align-items: center; gap: 8px;">
            <button class="filter-btn active" id="btn-private" onclick="setWorkFilter(false)">生活</button>
            <button class="filter-btn" id="btn-work" onclick="setWorkFilter(true)">仕事</button>
            <button id="sync-btn" onclick="syncTasks()" title="SYNC_BRAIN"
              style="background:none; border:none; color:var(--neon-cyan); cursor:pointer; font-size:12px; opacity:0.6; padding:0; display:flex; align-items:center; transition: all 0.2s;">🔄</button>
          </div>
        </div>
        <div id="taskDash" style="flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;">
          <div class="dash-category">
            <div class="dash-category-header">判断 <span>DECISION</span></div>
            <div id="dash-user_decision"></div>
          </div>
          <div class="dash-category">
            <div class="dash-category-header">提案 <span>PROPOSAL</span></div>
            <div id="dash-ego_proposal"></div>
          </div>
          <div class="dash-category">
            <div class="dash-category-header">実行中 (Ego) <span>EGO_RUNNING</span></div>
            <div id="dash-ego_running"></div>
          </div>
          <div class="dash-category">
            <div class="dash-category-header">実行中 (User) <span>USER_RUNNING</span></div>
            <div id="dash-user_running"></div>
          </div>
          <div class="dash-category">
            <div class="dash-category-header">要整理 <span>NEEDS_ORG</span></div>
            <div id="dash-needs_org"></div>
          </div>
        </div>
      </aside>
    </div>

    <div id="toast" class="toast">NOTIFICATION</div>
  </div>

  <script>
    const mascotFrame = document.getElementById('mascotFrame');
    const avatarFrame = document.getElementById('avatarFrame');
    const commandInput = document.getElementById('commandInput');
    const chatStream = document.getElementById('chatStream');
    const thoughtStream = document.getElementById('thoughtStream');
    const taskDash = document.getElementById('taskDash');
    const toast = document.getElementById('toast');

    function showToast(txt) {
      toast.textContent = txt;
      toast.classList.add('active');
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    // State labels
    function setStateValue(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    // Append logs
    let currentFilter = 'all';
    function appendLog(who, text, tag = 'chat') {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'chat-msg ' + who + ' tag-' + tag;
      div.textContent = text;
      div.dataset.tag = tag;

      // Filter logic
      if (currentFilter !== 'all' && currentFilter !== tag) {
        div.style.display = 'none';
      }

      chatStream.appendChild(div);
      chatStream.scrollTop = chatStream.scrollHeight;

      if (who === 'ego') {
        avatarFrame.classList.add('speaking');
        setTimeout(() => avatarFrame.classList.remove('speaking'), 2000);
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(filter));
      });

      document.querySelectorAll('.chat-msg').forEach(msg => {
        if (filter === 'all' || msg.dataset.tag === filter) {
          msg.style.display = 'block';
        } else {
          msg.style.display = 'none';
        }
      });
    }

    let workMode = false;
    function setWorkFilter(isWork) {
      workMode = isWork;
      document.getElementById('btn-work').classList.toggle('active', isWork);
      document.getElementById('btn-private').classList.toggle('active', !isWork);
      renderTasks(lastTasks);
    }

    let lastTasks = [];
    function renderTasks(tasks) {
      lastTasks = tasks;
      const categories = ['user_decision', 'ego_proposal', 'ego_running', 'user_running', 'needs_org'];
      categories.forEach(c => {
        const container = document.getElementById('dash-' + c);
        if (!container) return;

        const filtered = tasks.filter(t => {
          const catMatch = t.category === c;
          const workMatch = workMode ? t.is_work : !t.is_work;
          return catMatch && workMatch;
        });

        let html = '';
        filtered.slice(0, 6).forEach(t => {
          let btnLabel = 'GO';
          if (c === 'user_decision') btnLabel = 'OK';
          if (c === 'ego_running') btnLabel = 'STOP';
          if (c === 'user_running') btnLabel = 'DONE';
          if (c === 'needs_org') btnLabel = 'CHECK';

          let title = t.title;
          // Rename "Before Running" logic (User mentioned if GO is pressed it becomes running)
          // We assume for now if it's in propuesta, it's "Before Running"
          const displayLabel = c === 'ego_proposal' ? '実行前' : '';

          html += `<div class="dash-card ${c}">`
            + `<div style="display:flex; flex-direction:column; flex:1;">`
            + `<span style="font-size:9px; opacity:0.5;">${displayLabel}</span>`
            + `<span style="font-size:11px;">${title}</span>`
            + `</div>`
            + `<button class="dash-card-btn" onclick="handleTask('${t.id}', '${c}')">${btnLabel}</button>`
            + `</div>`;
        });
        container.innerHTML = html;
        container.parentElement.style.display = filtered.length > 0 ? 'block' : 'none';
      });

      // Pulse avatar if waiting for approval
      if (tasks.some(t => t.category === 'user_decision')) {
        avatarFrame.style.borderColor = '#ff9d00';
        avatarFrame.style.boxShadow = '0 0 15px rgba(255,157,0,0.3)';
      } else {
        avatarFrame.style.borderColor = '';
        avatarFrame.style.boxShadow = '';
      }
    }

    function addThought(txt) {
      const div = document.createElement('div');
      const isSystem = txt.startsWith('SYSTEM') || txt.startsWith('[HUB]');
      div.className = 'thought-msg' + (isSystem ? ' system' : '');
      div.textContent = '> ' + txt;
      thoughtStream.prepend(div);
      if (thoughtStream.children.length > 40) thoughtStream.lastElementChild.remove();
    }

    // Audio System (ADR-0114)
    let audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.error("Web Audio API not supported");
    }

    let audioQueue = [];
    let isPlaying = false;

    async function decodeAndPlay(base64Data, format = 'mp3') {
      if (!audioCtx) return;
      try {
        const mime = format === 'wav' ? 'audio/wav' : 'audio/mp3';
        const resp = await fetch(`data:${mime};base64,${base64Data}`);
        const arrayBuffer = await resp.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioQueue.push(audioBuffer);

        // Show audio activity in UI
        const statusEl = document.getElementById('val-status');
        if (statusEl && statusEl.textContent === 'LISTENING') statusEl.textContent = 'SPEAKING'; // Added null check for statusEl

        if (!isPlaying) playNext();
      } catch (e) {
        console.error("Audio Decode Error:", e);
        addThought("Audio Error: " + e.message);
      }
    }

    function playNext() {
      if (!audioCtx || audioQueue.length === 0) {
        isPlaying = false;
        return;
      }
      isPlaying = true;
      const buffer = audioQueue.shift();
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.onended = playNext;
      source.start();
    }

    function syncTasks() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'refresh_tasks' }));
        const btn = document.getElementById('sync-btn');
        btn.style.transform = 'rotate(360deg)';
        btn.style.opacity = '1';
        setTimeout(() => {
          btn.style.transform = 'rotate(0deg)';
          btn.style.opacity = '0.6';
        }, 1000);
      }
    }

    const unlockAudio = () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
          console.log("AudioContext resumed");
          addThought("Audio system online.");
        });
      }
      if (mascotFrame && mascotFrame.contentWindow) {
        mascotFrame.contentWindow.postMessage({ type: 'resume_audio' }, '*');
      }
    };
    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('keydown', unlockAudio, { once: true });
    window.addEventListener('touchstart', unlockAudio, { once: true });

    // WebSocket Logic
    let ws = null;
    function connect() {
      ws = new WebSocket('ws://localhost:8082/ws');
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);

          if (msg.type === 'audio') decodeAndPlay(msg.data, msg.format);

          if (msg.type === 'state') {
            setStateValue('ego-state', msg.state.toUpperCase());
            // Sync to Mascot Frame
            if (mascotFrame && mascotFrame.contentWindow) {
              mascotFrame.contentWindow.postMessage({ type: 'state', state: msg.state }, '*');
            }
            // Local visual feedback
            if (msg.state === 'speaking') {
              avatarFrame.classList.add('speaking');
              avatarFrame.classList.remove('thinking');
            } else if (msg.state === 'thinking' || msg.state === 'transcribing') {
              avatarFrame.classList.add('thinking');
              avatarFrame.classList.remove('speaking');
            } else {
              avatarFrame.classList.remove('speaking');
              avatarFrame.classList.remove('thinking');
            }
          }

          if (msg.type === 'chat') {
            appendLog(msg.who, msg.text, msg.tag || 'chat');
          }

          if (msg.type === 'thought') addThought(msg.text);

          if (msg.type === 'level_data') {
            setStateValue('val-lvl', msg.lvl);
            const xpBar = document.getElementById('bar-xp');
            if (xpBar) xpBar.style.width = msg.xp_percent + '%';
          }

          if (msg.type === 'tasks') renderTasks(msg.tasks);

          if (msg.type === 'task_status_change') {
            const el = document.querySelector(`.dash-card-btn[onclick*="'${msg.task_id}'"]`);
            if (el) {
              const card = el.closest('.dash-card');
              if (msg.status === 'running') {
                el.textContent = 'RUNNING';
                el.disabled = true;
                el.style.background = 'var(--neon-cyan)';
                el.style.color = '#000';
                el.style.animation = 'mic-pulse 1.5s infinite';
                if (card) card.style.borderLeft = '4px solid var(--neon-cyan)';
              } else if (msg.status === 'completed' || msg.status === 'approved') {
                el.textContent = '✓ DONE';
                el.disabled = true;
                el.style.background = '#0a3';
                el.style.color = '#fff';
                if (card) card.style.opacity = '0.5';
              } else if (msg.status === 'stopped') {
                el.textContent = 'STOPPED';
                el.disabled = true;
                el.style.background = '#f44';
                el.style.color = '#fff';
              }
            }
            showToast(msg.status.toUpperCase() + ': ' + msg.task_id);
          }

          // Phase 2: Confirmation Dialog for task/ADR creation
          if (msg.type === 'confirm_dialog') {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;-webkit-app-region:no-drag';
            overlay.innerHTML = `<div style="background:rgba(0,20,30,0.95);border:1px solid var(--neon-cyan);padding:30px;max-width:400px;text-align:center;border-radius:4px;">
              <div style="color:var(--neon-cyan);margin-bottom:15px;font-size:13px;">${msg.message}</div>
              <div style="display:flex;gap:15px;justify-content:center;">
                <button id="confirm-yes" style="background:var(--neon-cyan);color:#000;border:none;padding:8px 20px;cursor:pointer;">はい</button>
                <button id="confirm-no" style="background:transparent;color:var(--neon-cyan);border:1px solid var(--neon-cyan);padding:8px 20px;cursor:pointer;">いいえ</button>
              </div>
            </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#confirm-yes').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: true }));
              overlay.remove();
            };
            overlay.querySelector('#confirm-no').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: false }));
              overlay.remove();
            };
          }

          if (msg.type === 'tts_error') {
            addThought("TTS ERROR: " + msg.error);
            console.error("TTS Error:", msg.error);
          }
        } catch (err) {
          console.error("WS Parse Error:", err);
        }
      };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = (err) => console.error("WS Error:", err);
    }
    connect();

    // Command Input
    commandInput.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const txt = commandInput.value.trim();
        if (txt && ws && ws.readyState === 1) {
          appendLog('user', txt);
          ws.send(JSON.stringify({ type: 'text_input', text: txt }));
          commandInput.value = '';
        }
      }
    };

    // Mic (Toggle) System
    const micBtn = document.getElementById('micBtn');
    const voiceWave = document.getElementById('voiceWave');
    let isRecording = false;

    function toggleMic() {
      if (!ws || ws.readyState !== 1) return;

      if (!isRecording) {
        // START RECORDING
        isRecording = true;
        micBtn.classList.add('active');
        voiceWave.classList.add('active');
        avatarFrame.classList.add('thinking'); // Feedback
        ws.send(JSON.stringify({ type: 'start_mic' }));
      } else {
        // STOP & PROCESS
        isRecording = false;
        micBtn.classList.remove('active');
        voiceWave.classList.remove('active');
        avatarFrame.classList.remove('thinking');
        ws.send(JSON.stringify({ type: 'stop_mic' }));
      }
    }

    micBtn.onclick = toggleMic;

    // Keyboard PTT (Space) or Toggle (optional)
    window.onkeydown = (e) => {
      if (e.key === '/' && document.activeElement !== commandInput) {
        e.preventDefault();
        commandInput.focus();
      }
      if (e.code === 'Space' && document.activeElement !== commandInput) {
        if (!isRecording) toggleMic();
      }
    };
    window.onkeyup = (e) => {
      // For Toggle Mode, we don't necessarily stop on keyup, 
      // but if the user expects PTT, they'd want it to stop.
      // Given the request "Toggle Mode", ignoring keyup might be safer 
      // OR we support both. Let's stick to Toggle for now as requested.
    };

    window.handleTask = (id, cat) => {
      if (ws && ws.readyState === 1) {
        if (cat === 'user_decision') ws.send(JSON.stringify({ type: 'task_approve', task_id: id }));
        else if (cat === 'ego_running') ws.send(JSON.stringify({ type: 'task_stop', task_id: id }));
        else if (cat === 'user_running') ws.send(JSON.stringify({ type: 'task_complete', task_id: id }));
        else ws.send(JSON.stringify({ type: 'task_execute', task_id: id }));
        showToast('SEND_COMMAND: ' + id);
      }
    };

    // Electron Controls
    try {
      const { ipcRenderer } = window.require('electron');
      document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-window');
      document.getElementById('max-btn').onclick = () => ipcRenderer.send('maximize-window');
      document.getElementById('close-btn').onclick = () => window.close();
    } catch (e) { }

    // Polling Metrics
    setInterval(() => {
      fetch('http://localhost:8000/metrics').then(r => r.json()).then(m => {
        setStateValue('val-cpu', m.cpu_percent + '%');
        setStateValue('val-mem', m.memory_percent + '%');
      }).catch(e => { });
    }, 5000);
  </script>
</body>

</html>
