<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CanonGate HUD</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="hud-container">
    <div class="win-ctrl">
      <button id="min-btn">ー</button>
      <button id="max-btn">▢</button>
      <button id="close-btn">×</button>
    </div>

    <!-- 
    <header class="hud-header">
       ... (Hidden as requested) ...
    </header> 
    -->

    <div class="hud-main-layout task-panel-closed">
      <!-- Left: Intelligence Stream -->
      <button class="panel-toggle-btn left-toggle" id="leftToggleBtn" onclick="toggleLeftPanel()"
        title="チャット表示/非表示">▶</button>
      <aside class="hud-wing left-wing panel-hidden" id="leftPanel">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 15px;">INTELLIGENCE_STREAM</div>
        <div class="stream-filters">
          <button class="filter-btn active" onclick="setFilter('all')">全て</button>
          <button class="filter-btn" onclick="setFilter('chat')">対話</button>
          <button class="filter-btn" onclick="setFilter('soliloquy')">独り言</button>
          <button class="filter-btn" onclick="setFilter('patrol')">巡回</button>
        </div>
        <div id="chatStream" class="chat-stream"></div>
        <div id="thoughtStream" class="thought-stream"></div>
      </aside>

      <!-- Center: Avatar Core -->
      <main class="center-core">
        <div class="avatar-frame" id="avatarFrame">
          <iframe id="mascotFrame" src="../mascot-web/index.html?mode=viewer" frameborder="0" scrolling="no"
            style="width:100%; height:100%; border:none; pointer-events: none;"></iframe>
        </div>
        <div style="font-size: 11px; letter-spacing: 4px; color: var(--neon-cyan); opacity: 0.7;">CANON_SYSTEM</div>
        <div class="hud-command-area" style="flex-direction: column;">
          <div class="voice-wave-container" id="voiceWave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
            <button class="voice-btn mic-btn" id="voiceBtn" title="Canonの声 On/Off">
              <svg viewBox="0 0 24 24" id="voiceBtnSvg">
                <path
                  d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
              </svg>
            </button>
            <button class="mic-btn" id="micBtn">
              <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                  d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
              </svg>
            </button>
            <input type="text" id="commandInput" placeholder="ENTER_COMMAND_OR_VOICE..." autocomplete="off">
          </div>
        </div>
      </main>

      <!-- Right: Mission/Task Dash (toggleable) -->
      <aside class="hud-wing right-wing">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div class="section-toggle" onclick="toggleTasks()" style="margin-bottom:0;">
            <span style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">MISSION_RADAR</span>
            <span class="toggle-arrow" id="taskToggleArrow">▼</span>
          </div>
          <div class="stream-filters" style="margin-bottom: 0; display: flex; align-items: center; gap: 8px;">
            <button class="filter-btn active" id="btn-private" onclick="setWorkFilter(false)">生活</button>
            <button class="filter-btn" id="btn-work" onclick="setWorkFilter(true)">仕事</button>
            <select id="task-sort-select" onchange="setTaskSort(this.value)"
              style="background: rgba(0,20,30,0.9); color: var(--neon-cyan); border: 1px solid rgba(0,255,255,0.25); padding: 4px 6px; font-size: 11px;">
              <option value="priority" selected>優先順</option>
              <option value="project">PJ順</option>
              <option value="title">名前順</option>
            </select>
            <button id="sync-btn" onclick="syncTasks()" title="SYNC_BRAIN"
              style="background:none; border:none; color:var(--neon-cyan); cursor:pointer; font-size:12px; opacity:0.6; padding:0; display:flex; align-items:center; transition: all 0.2s;">🔄</button>
            <button id="task-panel-close-btn" onclick="toggleTaskPanel(false)" title="パネルを閉じる"
              style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px; padding:0 4px; line-height:1;">◀</button>
          </div>
        </div>
        <div id="taskPanelContent" class="collapsible-content">
          <div class="task-panel-inner">
            <!-- Dashboard Tabs (ADR-0185) -->
            <div class="dashboard-tabs"
              style="display: flex; gap: 4px; margin-bottom: 8px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 6px;">
              <button class="filter-btn active" id="tab-focus" onclick="switchDashboardTab('focus')"
                style="font-size: 11px; padding: 3px 8px;">🎯 集中</button>
              <button class="filter-btn" id="tab-auto" onclick="switchDashboardTab('auto')"
                style="font-size: 11px; padding: 3px 8px;">🤖 AI</button>
              <button class="filter-btn" id="tab-manage" onclick="switchDashboardTab('manage')"
                style="font-size: 11px; padding: 3px 8px;">🛡️ 監視</button>
              <button class="filter-btn" id="tab-timeline" onclick="switchDashboardTab('timeline')"
                style="font-size: 11px; padding: 3px 8px;">📅 日程</button>
            </div>
            <div id="taskDash" style="flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;">
              <style>
                #taskDashContent.dashboard-tab-focus .lane-canon-output {
                  display: none !important;
                }

                #taskDashContent.dashboard-tab-auto .lane-your-turn,
                #taskDashContent.dashboard-tab-auto .weekly-summary {
                  display: none !important;
                }
                /* ADR-0192: Timeline tab hides task content, shows timeline */
                #taskDashContent.dashboard-tab-timeline .lane-your-turn,
                #taskDashContent.dashboard-tab-timeline .lane-canon-output,
                #taskDashContent.dashboard-tab-timeline .weekly-summary,
                #taskDashContent.dashboard-tab-timeline .manage-board {
                  display: none !important;
                }
                #timelineContainer {
                  display: none;
                }
                #taskDashContent.dashboard-tab-timeline ~ #taskDash #timelineContainer,
                .dashboard-tab-timeline #timelineContainer {
                  display: block !important;
                }
              </style>
              <div id="taskDashContent" class="dashboard-tab-focus"></div>
              <div id="timelineContainer" style="display:none;"></div>
            </div>
          </div>
        </div>
      </aside>
      <!-- Tabs on right edge when panel is closed -->
      <div class="right-edge-tabs" id="rightEdgeTabs">
        <button type="button" class="task-panel-tab" id="task-panel-tab" onclick="toggleTaskPanel(true)"
          aria-label="タスクパネルを開く">MISSION</button>
        <button type="button" class="task-panel-tab notif-tab" id="bottomPanelTab" onclick="toggleBottomPanel()"
          aria-label="通知パネルを開く">
          <span>NOTIFICATION</span>
          <span class="bottom-tab-badge" id="notifBadge" style="display:none;">0</span>
        </button>
      </div>
    </div>

    <!-- Notification Panel (slides up from bottom) -->
    <div class="bottom-panel" id="bottomPanel">
      <div class="bottom-panel-header">
        <span style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">NOTIFICATION_STREAM</span>
        <div style="display:flex; gap:12px; align-items:center;">
          <button onclick="clearNotifications()"
            style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:10px;">クリア</button>
          <button onclick="toggleBottomPanel()"
            style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px;">✕</button>
        </div>
      </div>
      <div class="bottom-panel-content" id="notifContent"></div>
    </div>

    <div id="toast" class="toast">NOTIFICATION</div>
  </div>

  <script>
    const mascotFrame = document.getElementById('mascotFrame');
    const avatarFrame = document.getElementById('avatarFrame');
    const commandInput = document.getElementById('commandInput');
    const chatStream = document.getElementById('chatStream');
    const thoughtStream = document.getElementById('thoughtStream');
    const taskDash = document.getElementById('taskDash');
    const toast = document.getElementById('toast');
    const hudMainLayout = document.querySelector('.hud-main-layout');

    // Default: task panel closed (hidden). Open = full-window task view.
    if (hudMainLayout) hudMainLayout.classList.add('task-panel-closed');

    function toggleTaskPanel(open) {
      if (!hudMainLayout) return;
      if (open) hudMainLayout.classList.remove('task-panel-closed');
      else hudMainLayout.classList.add('task-panel-closed');
    }

    function showToast(txt) {
      toast.textContent = txt;
      toast.classList.add('active');
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    // State labels
    function setStateValue(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    // Append logs
    let currentFilter = 'all';
    function appendLog(who, text, tag = 'chat') {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'chat-msg ' + who + ' tag-' + tag;
      div.textContent = text;
      div.dataset.tag = tag;

      // Filter logic
      if (currentFilter !== 'all' && currentFilter !== tag) {
        div.style.display = 'none';
      }

      chatStream.appendChild(div);
      chatStream.scrollTop = chatStream.scrollHeight;

      if (who === 'ego') {
        avatarFrame.classList.add('speaking');
        setTimeout(() => avatarFrame.classList.remove('speaking'), 2000);
      }
    }

    function toggleSection(contentId, arrowId) {
      const content = document.getElementById(contentId);
      const arrow = document.getElementById(arrowId);
      if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        arrow.textContent = '▼';
      } else {
        content.classList.add('collapsed');
        arrow.textContent = '▶';
      }
    }
    function toggleLeftPanel() {
      const panel = document.getElementById('leftPanel');
      const btn = document.getElementById('leftToggleBtn');
      if (panel.classList.contains('panel-hidden')) {
        panel.classList.remove('panel-hidden');
        btn.textContent = '◀';
      } else {
        panel.classList.add('panel-hidden');
        btn.textContent = '▶';
      }
    }
    function toggleTasks() { toggleSection('taskPanelContent', 'taskToggleArrow'); }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(filter));
      });

      document.querySelectorAll('.chat-msg').forEach(msg => {
        if (filter === 'all' || msg.dataset.tag === filter) {
          msg.style.display = 'block';
        } else {
          msg.style.display = 'none';
        }
      });
    }

    // domain 自動判定: URL パラメータ or バックエンドから届くタスクの is_work で判定
    let workMode = false;
    let _workModeAutoDetected = false;
    let taskSortMode = 'priority';
    try {
      const _p = new URLSearchParams(window.location.search || '');
      if (_p.get('domain') === 'tech') {
        workMode = true;
        _workModeAutoDetected = true;
      }
    } catch (e) { }
    function _syncFilterButtons() {
      var bw = document.getElementById('btn-work');
      var bp = document.getElementById('btn-private');
      if (bw) bw.classList.toggle('active', workMode);
      if (bp) bp.classList.toggle('active', !workMode);
    }
    if (_workModeAutoDetected) _syncFilterButtons();
    function setWorkFilter(isWork) {
      workMode = isWork;
      document.getElementById('btn-work').classList.toggle('active', isWork);
      document.getElementById('btn-private').classList.toggle('active', !isWork);
      renderTasks(lastTasks);
    }
    function setTaskSort(mode) {
      taskSortMode = mode || 'priority';
      renderTasks(lastTasks);
    }

    let lastTasks = [];
    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function getPhaseLabel(c) {
      const labels = { ego_proposal: '実行前', user_decision: '判断', ego_running: '実行中(E)', user_running: '実行中(U)', done_recent: '完了', needs_org: '要整理' };
      return labels[c] || '要整理';
    }
    function getCategorySortRank(category) {
      const ranks = {
        user_decision: 0,
        ego_proposal: 1,
        needs_org: 2,
        ego_running: 3,
        user_running: 4,
        done_recent: 5,
      };
      return Object.prototype.hasOwnProperty.call(ranks, category) ? ranks[category] : 9;
    }
    function getPrioritySortRank(task) {
      return Number.isFinite(task.priority_rank) ? task.priority_rank : 999;
    }
    function compareTasks(a, b) {
      if (taskSortMode === 'title') {
        return (a.title || '').localeCompare(b.title || '', 'ja');
      }

      if (taskSortMode === 'project') {
        const byProject = (a.project || '').localeCompare(b.project || '', 'ja');
        if (byProject !== 0) return byProject;
      }

      const byPriority = getPrioritySortRank(a) - getPrioritySortRank(b);
      if (byPriority !== 0) return byPriority;

      const byCategory = getCategorySortRank(a.category) - getCategorySortRank(b.category);
      if (byCategory !== 0) return byCategory;

      return (a.title || '').localeCompare(b.title || '', 'ja');
    }
    let lastCanonSummary = {};
    let lastSubLaneLabels = {};
    function renderTasks(tasks, laneCounts, canonSummary, subLaneLabels) {
      lastTasks = tasks;
      if (canonSummary) lastCanonSummary = canonSummary;
      if (subLaneLabels) lastSubLaneLabels = subLaneLabels;
      const container = document.getElementById('taskDashContent');
      if (!container) return;
      try { _renderTasksInner(tasks, container); }
      catch (e) { console.error('renderTasks error:', e); container.innerHTML = '<div style="color:#f44;padding:12px;">表示エラー: ' + e.message + '</div>'; }
    }

    let currentDashTab = 'focus';
    function switchDashboardTab(tab) {
      currentDashTab = tab;
      document.querySelectorAll('.dashboard-tabs .filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'tab-' + tab);
      });
      const content = document.getElementById('taskDashContent');
      const tlContainer = document.getElementById('timelineContainer');
      if (content) {
        content.className = 'dashboard-tab-' + tab;
        if (tab === 'timeline') {
          content.style.display = 'none';
          if (tlContainer) tlContainer.style.display = 'block';
          // Request fresh timeline data
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'refresh_timeline' }));
          }
        } else {
          content.style.display = '';
          if (tlContainer) tlContainer.style.display = 'none';
          renderTasks(lastTasks); // Re-render content dynamically
        }
      }
    }

    // ─── ADR-0192: Timeline Rendering ───
    let _lastTimelineData = null;

    function renderTimeline(data) {
      _lastTimelineData = data;
      const container = document.getElementById('timelineContainer');
      if (!container) return;

      const { date, now, timeline, tasks, summary, today_plan } = data;

      // Briefing (today_plan)
      let html = '';
      if (today_plan && today_plan.briefing) {
        html += `<div class="tl-briefing">
          <div class="tl-briefing-icon">📋</div>
          <div class="tl-briefing-text">${escapeHtml(today_plan.briefing)}</div>
        </div>`;
      }

      // Summary bar
      html += `<div class="tl-summary">
        <span class="tl-date">${date}</span>
        <span class="tl-chip tl-chip-event">${summary.total_events} 予定</span>
        <span class="tl-chip tl-chip-task">${summary.total_tasks} タスク</span>
        <span class="tl-chip tl-chip-free">${summary.free_minutes}分 空き</span>
      </div>`;

      // Top 3 Tasks (today_plan)
      if (today_plan && today_plan.top3_tasks && today_plan.top3_tasks.length > 0) {
        html += '<div class="tl-top3-header">🎯 今日やるべき</div>';
        html += '<div class="tl-top3">';
        today_plan.top3_tasks.forEach((t, i) => {
          const prio = t.priority || '';
          html += `<div class="tl-top3-item">
            <span class="tl-top3-num">${i + 1}</span>
            <span class="tl-top3-prio">${prio}</span>
            <span class="tl-top3-title">${escapeHtml(t.title)}</span>
          </div>`;
        });
        html += '</div>';
      }

      // Blockers
      if (today_plan && today_plan.blockers && today_plan.blockers.length > 0) {
        html += '<div class="tl-blockers">';
        today_plan.blockers.forEach(b => {
          html += `<div class="tl-blocker-item">⛔ ${escapeHtml(b.title)}</div>`;
        });
        html += '</div>';
      }

      // Next event alert
      if (summary.next_event) {
        const ne = summary.next_event;
        const urgency = ne.minutes_until <= 10 ? 'tl-next-urgent' : '';
        html += `<div class="tl-next-event ${urgency}">
          次の予定: <strong>${escapeHtml(ne.title)}</strong> ${ne.start}〜 (あと${ne.minutes_until}分)
        </div>`;
      }

      // Meeting prep suggestions
      if (today_plan && today_plan.meeting_prep && today_plan.meeting_prep.length > 0) {
        html += '<div class="tl-meeting-prep">';
        today_plan.meeting_prep.forEach(mp => {
          html += `<div class="tl-prep-item">
            <div class="tl-prep-meeting">📅 ${escapeHtml(mp.meeting)} (${mp.meeting_time})</div>
            <div class="tl-prep-tasks">準備: ${mp.prep_tasks.map(t => escapeHtml(t)).join(', ')}</div>
          </div>`;
        });
        html += '</div>';
      }

      // Timeline entries with slot assignments
      html += '<div class="tl-entries">';
      const slotAssigns = (today_plan && today_plan.slot_assignments) || [];
      for (const entry of timeline) {
        if (entry.type === 'calendar') {
          const isPast = now && entry.end && entry.end <= now;
          const isCurrent = now && entry.start <= now && entry.end > now;
          const cls = isCurrent ? 'tl-current' : (isPast ? 'tl-past' : '');
          html += `<div class="tl-entry tl-calendar ${cls}">
            <div class="tl-time">${entry.start}-${entry.end}</div>
            <div class="tl-bar tl-bar-calendar"></div>
            <div class="tl-title">${escapeHtml(entry.title)}</div>
          </div>`;
        } else if (entry.type === 'free_slot') {
          // Check if a task is assigned to this slot
          const assign = slotAssigns.find(a => a.slot_start === entry.start);
          const assignHtml = assign
            ? `<div class="tl-slot-task">→ ${assign.task_priority} ${escapeHtml(assign.suggested_task)}</div>`
            : '';
          html += `<div class="tl-entry tl-free">
            <div class="tl-time">${entry.start}-${entry.end}</div>
            <div class="tl-bar tl-bar-free"></div>
            <div class="tl-title tl-title-free">${escapeHtml(entry.title)}${assignHtml}</div>
          </div>`;
        }
      }
      html += '</div>';

      // Task list (priority sorted) - keep as fallback
      if (tasks && tasks.length > 0) {
        html += '<div class="tl-tasks-header">全タスク（優先度順）</div>';
        html += '<div class="tl-tasks">';
        for (const t of tasks) {
          const statusCls = t.status === 'running' ? 'tl-task-running' : '';
          const prioHtml = t.priority_label ? `<span class="tl-task-prio">${t.priority_label}</span> ` : '';
          html += `<div class="tl-task ${statusCls}">
            ${prioHtml}<span class="tl-task-title">${escapeHtml(t.title)}</span>
          </div>`;
        }
        html += '</div>';
      }

      container.innerHTML = html;
    }

    const SUB_LANE_ORDER = ['urgent','this_week','team_watch','projects','adr','slack','waiting','canon_queue','low_priority'];
    const SUB_LANE_DEFAULTS = {
      urgent: '\u{1F534} 火急（自分対応）', this_week: '\u{1F7E1} 今週やること（自分対応）',
      team_watch: '\u{1F465} チーム状況（PM確認）', projects: '\u{1F4CA} プロジェクト進行',
      adr: '\u{1F4CB} ADR 未協議', slack: '\u{1F4AC} Slack 未確認', waiting: '\u23F3 待ち状態',
      canon_queue: '\u{1F916} Canon 処理中/予定', low_priority: '\u{1F4DD} 確認任意'
    };

    function _renderTaskRow(t) {
      const hint = escapeHtml(t.action_hint || getPhaseLabel(t.category) || '');
      const hintClass = t.cli_failed ? 'action-failed'
        : t.sub_lane === 'urgent' ? 'action-failed'
          : (t.category === 'user_decision' ? 'action-decision' : 'action-review');
      const ctx = t.context ? escapeHtml(t.context) : '';
      const srcUrl = t.source_url || '';
      const run = t.last_run ? escapeHtml(t.last_run) : '';
      const failReason = t.failure_reason ? escapeHtml(t.failure_reason) : '';
      let detail = '';
      const parts = [];
      if (failReason) parts.push('<span class="fail-reason">' + failReason + '</span>');
      else if (ctx) parts.push(ctx);
      if (t.source === 'clickup' && srcUrl) parts.push('<a href="' + escapeHtml(srcUrl) + '" target="_blank" class="source-link">ClickUp</a>');
      if (run) parts.push('\u6700\u7D42: ' + run);
      if (parts.length > 0) detail = `<div class="task-detail">${parts.join(' \u00B7 ')}</div>`;
      return `<tr class="dash-row ${t.category || ''} task-row-clickable" data-task-id="${escapeHtml(t.id)}" data-category="${t.category || 'ego_proposal'}" data-is-work="${t.is_work}">`
        + `<td class="col-action"><span class="action-hint ${hintClass}">${hint}</span></td>`
        + `<td class="col-title">${escapeHtml(t.title)}${detail}</td>`
        + `</tr>`;
    }

    function _renderTasksInner(tasks, container) {
      const filtered = tasks.filter(t => (workMode ? t.is_work : !t.is_work));

      filtered.forEach(t => {
        if (!t.lane) {
          if (t.category === 'user_decision' || t.category === 'user_running' || t.cli_failed) t.lane = 'your_turn';
          else t.lane = '_canon';
        }
      });

      const yourTurn = filtered.filter(t => t.lane === 'your_turn');
      const doneRecent = filtered.filter(t => t.category === 'done_recent');
      const cs = lastCanonSummary || {};
      const hasSubLanes = yourTurn.some(t => t.sub_lane);

      let html = '<div class="lane-container">';

      // ===== 今週サマリ =====
      const ws = cs.weekly_summary || [];

        // _other
        if (groups['_other'] && groups['_other'].length > 0) {
          html += '<div class="sub-lane-group"><div class="sub-lane-header"><span class="sub-lane-label">その他</span><span class="sub-lane-count">' + groups['_other'].length + '</span></div>';
          html += '<table class="task-table"><tbody>';
          groups['_other'].forEach(t => { html += _renderTaskRow(t); });
          html += '</tbody></table></div>';

      } else if (actionItems.length > 0) {
        // 従来の一括表示
        html += '<table class="task-table"><tbody>';
        actionItems.sort(compareTasks).forEach(t => { html += _renderTaskRow(t); });
        html += '</tbody></table>';
      } else {
        html += '<div class="lane-empty">Canon \u304C\u3059\u3079\u3066\u51E6\u7406\u4E2D \u2014 \u3042\u306A\u305F\u3078\u306E\u78BA\u8A8D\u4E8B\u9805\u306A\u3057</div>';
      }
      html += '</div>';

      // ===== Canon 稼働状況 =====
      html += '<div class="lane lane-canon-output">';
      html += '<div class="lane-header canon-output-header">Canon \u7A3C\u50CD\u72B6\u6CC1</div>';
      html += '<div class="canon-summary-bar">';
      const done = cs.cli_done || 0;
      const running = cs.running || 0;
      const auto = cs.autonomous || 0;
      const failed = cs.failed || 0;
      const queue = cs.queue || 0;
      if (queue > 0) html += `<span class="summary-chip chip-running">Canon\u51E6\u7406\u4E88\u5B9A ${queue}</span>`;
      if (done > 0) html += `<span class="summary-chip chip-done">\u5B8C\u4E86 ${done}</span>`;
      if (running > 0) html += `<span class="summary-chip chip-running">\u5B9F\u884C\u4E2D ${running}</span>`;
      if (auto > 0) html += `<span class="summary-chip chip-pending">\u5F85\u6A5F\u4E2D ${auto}</span>`;
      if (failed > 0) html += `<span class="summary-chip chip-failed">\u5931\u6557 ${failed}</span>`;
      if (done === 0 && running === 0 && auto === 0 && failed === 0 && queue === 0) html += '<span class="summary-chip chip-pending">\u30C7\u30FC\u30BF\u306A\u3057</span>';
      html += '</div>';
      // Canon 処理予定タスク一覧
      if (cs.queue_titles && cs.queue_titles.length > 0) {
        html += '<div class="canon-queue-list">';
        cs.queue_titles.forEach(title => {
          html += `<div class="canon-queue-item">\u{1F916} ${escapeHtml(title)}</div>`;
        });
        html += '</div>';
      }
      if (doneRecent.length > 0) {
        html += '<div class="lane-sub-header">\u76F4\u8FD124h\u5B8C\u4E86</div><table class="task-table"><tbody>';
        doneRecent.forEach(t => {
          html += `<tr class="dash-row done_recent"><td class="col-title">${escapeHtml(t.title)}</td><td class="col-eval">${escapeHtml(t.completed_at || '')}</td></tr>`;
        });
        html += '</tbody></table>';
      }
      html += '</div>';

      html += '</div>';

      if (currentDashTab === 'manage') {
        const typeMap = { '定例': [], 'プログラミング/PJ': [], 'スポット/その他': [] };
        const ownerMap = { 'tact': [], 'canon': [], 'member': [] };

        filtered.forEach(t => {
          const title = (t.title || '').toLowerCase();
          const folder = (t.folder || '').toLowerCase();
          const tags = Array.isArray(t.tags) ? t.tags.map(tg => (typeof tg === 'string' ? tg : tg.name || '').toLowerCase()) : [];

          let tType = 'スポット/その他';
          if (title.includes('定例') || title.includes('定期') || folder.includes('routine') || tags.includes('定例') || tags.includes('routine')) {

          } else if (t.project || folder.includes('pj') || folder.includes('プロジェクト') || folder.includes('開発') || tags.includes('pj') || tags.includes('project')) {

          if (t.lane === 'your_turn') owner = 'tact';
          else if (t.lane === '_canon' || title.includes('🤖') || title.includes('canon') || tags.includes('canon') || tags.includes('ai')) {

          typeMap[tType].push(item);
          ownerMap[owner].push(item);

        html = '<div class="lane-container manage-view" style="display:flex; flex-direction:column; gap:12px;">';

        // ① オーナー別ステータスボード（ボール保持者）
        html += '<div class="lane"><div class="lane-header">👥 ステータス総合（ボール保持者）</div><div style="padding:12px; font-size:11px; display:flex; flex-direction:column; gap:10px;">';

        // タクト
        const tactWait = ownerMap['tact'].filter(t => t.category === 'user_decision' || t.category === 'user_running');
        html += `<div style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px;">`
          + `<span style="color:#ff9d00; font-weight:bold; font-size:12px;">🙋‍♂️ タクトさん対応待ち (${tactWait.length}件)</span>`
          + `<div style="padding-left:14px; margin-top:4px; opacity:0.8; display:flex; flex-direction:column; gap:2px;">`;
        if (tactWait.length > 0) {
          tactWait.slice(0, 3).forEach(i => html += `<div>・ ${escapeHtml(i.title)}</div>`);
          if (tactWait.length > 3) html += `<div style="font-size:10px; opacity:0.5;">他 ${tactWait.length - 3} 件...</div>`;
        } else html += '<div style="opacity:0.6;">(現在ありません)</div>';
        html += '</div></div>';

        // カノン
        const canonActive = ownerMap['canon'].filter(t => t.lane === '_canon');
        html += `<div style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px;">`
          + `<span style="color:var(--neon-cyan); font-weight:bold; font-size:12px;">🤖 カノン自動実行中 (${canonActive.length}件)</span>`
          + `<div style="padding-left:14px; margin-top:4px; opacity:0.8; display:flex; flex-direction:column; gap:2px;">`;
        if (canonActive.length > 0) {
          canonActive.slice(0, 3).forEach(i => html += `<div>・ ${escapeHtml(i.title)}</div>`);
          if (canonActive.length > 3) html += `<div style="font-size:10px; opacity:0.5;">他 ${canonActive.length - 3} 件...</div>`;
        } else html += '<div style="opacity:0.6;">(待機中)</div>';
        html += '</div></div>';

        // メンバー
        const defaultMember = ownerMap['member'] || [];
        html += `<div><span style="font-weight:bold;">👥 メンバー対応中 (${defaultMember.length}件)</span></div>`;
        html += '</div></div>';

        // ② タスク種別・プロジェクト俯瞰
        html += '<div class="lane"><div class="lane-header">🗂️ 種別・プロジェクト俯瞰</div><div style="padding:10px; font-size:11px;">';

        for (const [key, items] of Object.entries(typeMap)) {
          if (items.length > 0) {
            html += `<div style="margin-bottom:10px;">`
              + `<div style="font-weight:bold; color:var(--neon-cyan); font-size:12px; margin-bottom:4px; border-bottom:1px solid rgba(0,255,255,0.15)">■ ${key} (${items.length}件)</div>`
              + `<div style="padding-left:8px; display:flex; flex-direction:column; gap:4px;">`;
            items.slice(0, 3).forEach(i => {
              const oBadge = i.owner === 'tact' ? '<span style="color:#ff9d00">[私]</span>' : (i.owner === 'canon' ? '<span style="color:var(--neon-cyan)">[AI]</span>' : '[他]');
              html += `<div style="opacity:0.9;">${oBadge} ${escapeHtml(i.title)}</div>`;
            });
            if (items.length > 3) html += `<div style="font-size:10px; opacity:0.5;">他 ${items.length - 3} 件...</div>`;
            html += `</div></div>`;
          }
        }
        html += '</div></div>';

        // ③ PJ 2week アクティビティ（projects_overview from dashboard.json）
        const pjOverview = lastCanonSummary.projects_overview || [];
        if (pjOverview.length > 0) {
          html += '<div class="lane"><div class="lane-header">📊 PJ 2week アクティビティ</div>';
          html += '<div style="padding:10px; font-size:11px;">';
          const heatIcon = {high:'🔴', medium:'🟡', low:'🟠', frozen:'⚪'};
          pjOverview.forEach(pj => {
            const icon = heatIcon[pj.heat] || '⚪';
            const bar = pj.total > 0 ? Math.min(Math.round((pj.recent_2w / pj.total) * 100), 100) : 0;
            html += `<div style="margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px;">`
              + `<div style="display:flex; justify-content:space-between; align-items:center;">`
              + `<span style="font-weight:bold;">${icon} ${escapeHtml(pj.name)}</span>`
              + `<span style="opacity:0.6; font-size:10px;">${pj.recent_2w}/${pj.total} (2w)</span>`
              + `</div>`
              + `<div style="background:rgba(255,255,255,0.05); border-radius:3px; height:4px; margin:3px 0;">`
              + `<div style="background:${pj.heat==='high'?'#f44':pj.heat==='medium'?'#ff9d00':'#666'}; width:${bar}%; height:100%; border-radius:3px;"></div>`
              + `</div>`
              + `<div style="opacity:0.7; font-size:10px;">${escapeHtml(pj.status)} — ${escapeHtml(pj.leads)}</div>`
              + `</div>`;
          });
          html += '</div></div>';
        }

        html += '</div>';
      }

      container.innerHTML = html;

      container.querySelectorAll('.task-row-clickable').forEach(tr => {
        tr.addEventListener('click', function () {
          const id = this.getAttribute('data-task-id');
          const cat = this.getAttribute('data-category');
          const isWork = this.getAttribute('data-is-work') === 'true';
          if (id && cat != null) handleTask(id, cat, isWork);
        });
      });

      if (yourTurn.length > 0) {
        avatarFrame.style.borderColor = '#ff9d00';
        avatarFrame.style.boxShadow = '0 0 15px rgba(255,157,0,0.3)';
      } else {
        avatarFrame.style.borderColor = '';
        avatarFrame.style.boxShadow = '';
      }
    }

    function addThought(txt) {
      const div = document.createElement('div');
      const isSystem = txt.startsWith('SYSTEM') || txt.startsWith('[HUB]');
      div.className = 'thought-msg' + (isSystem ? ' system' : '');
      div.textContent = '> ' + txt;
      thoughtStream.prepend(div);
      if (thoughtStream.children.length > 40) thoughtStream.lastElementChild.remove();
    }

    // Audio System (ADR-0114)
    let audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.error("Web Audio API not supported");
    }

    let audioQueue = [];
    let isPlaying = false;

    async function decodeAndPlay(base64Data, format = 'mp3') {
      if (!audioCtx) return;
      try {
        const mime = format === 'wav' ? 'audio/wav' : 'audio/mp3';
        const resp = await fetch(`data:${mime};base64,${base64Data}`);
        const arrayBuffer = await resp.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioQueue.push(audioBuffer);

        // Show audio activity in UI
        const statusEl = document.getElementById('val-status');
        if (statusEl && statusEl.textContent === 'LISTENING') statusEl.textContent = 'SPEAKING'; // Added null check for statusEl

        if (!isPlaying) playNext();
      } catch (e) {
        console.error("Audio Decode Error:", e);
        addThought("Audio Error: " + e.message);
      }
    }

    function playNext() {
      if (!audioCtx || audioQueue.length === 0) {
        isPlaying = false;
        return;
      }
      isPlaying = true;
      const buffer = audioQueue.shift();
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.onended = playNext;
      source.start();
    }

    function syncTasks() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'refresh_tasks' }));
        const btn = document.getElementById('sync-btn');
        btn.style.transform = 'rotate(360deg)';
        btn.style.opacity = '1';
        setTimeout(() => {
          btn.style.transform = 'rotate(0deg)';
          btn.style.opacity = '0.6';
        }, 1000);
      }
    }

    const unlockAudio = () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
          console.log("AudioContext resumed");
          addThought("Audio system online.");
        });
      }
      if (mascotFrame && mascotFrame.contentWindow) {
        mascotFrame.contentWindow.postMessage({ type: 'resume_audio' }, '*');
      }
    };
    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('keydown', unlockAudio, { once: true });
    window.addEventListener('touchstart', unlockAudio, { once: true });

    // WebSocket Logic（ポートは Commander API から取得、未取得時は 8082）
    let ws = null;
    let wsPort = 8082;
    async function connect() {
      try {
        const cfg = await fetch('http://localhost:8000/api/canon-gate-config').then(r => r.json()).catch(() => ({}));
        if (cfg.ws_port) wsPort = cfg.ws_port;
      } catch (e) { }
      const url = 'ws://localhost:' + wsPort + '/ws';
      ws = new WebSocket(url);
      ws.onopen = () => {
        showToast('Canon に接続しました');
        addThought('SYSTEM: Canon (音声) に接続しました');
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);

          if (msg.type === 'audio') decodeAndPlay(msg.data, msg.format);

          if (msg.type === 'state') {
            setStateValue('ego-state', msg.state.toUpperCase());
            // Sync to Mascot Frame
            if (mascotFrame && mascotFrame.contentWindow) {
              mascotFrame.contentWindow.postMessage({ type: 'state', state: msg.state }, '*');
            }
            // Local visual feedback
            if (msg.state === 'speaking') {
              avatarFrame.classList.add('speaking');
              avatarFrame.classList.remove('thinking');
            } else if (msg.state === 'thinking' || msg.state === 'transcribing') {
              avatarFrame.classList.add('thinking');
              avatarFrame.classList.remove('speaking');
            } else {
              avatarFrame.classList.remove('speaking');
              avatarFrame.classList.remove('thinking');
            }
          }

          if (msg.type === 'chat') {
            appendLog(msg.who, msg.text, msg.tag || 'chat');
          }

          if (msg.type === 'thought') addThought(msg.text);

          if (msg.type === 'level_data') {
            setStateValue('val-lvl', msg.lvl);
            const xpBar = document.getElementById('bar-xp');
            if (xpBar) xpBar.style.width = msg.xp_percent + '%';
          }

          if (msg.type === 'state_change') {
            if (typeof voiceOn !== 'undefined') {
              voiceOn = (msg.state !== 'muted');
              updateVoiceButton();
            }
          }

          // ADR-0192: Daily Timeline
          if (msg.type === 'daily_timeline') {
            renderTimeline(msg);
          }

          if (msg.type === 'tasks') {
            // 自動判定: 全タスクが is_work=true なら仕事モードに切り替え
            if (!_workModeAutoDetected && msg.tasks && msg.tasks.length > 0) {
              const allWork = msg.tasks.every(t => t.is_work);
              const allPrivate = msg.tasks.every(t => !t.is_work);
              if (allWork) { workMode = true; _workModeAutoDetected = true; _syncFilterButtons(); }
              else if (allPrivate) { workMode = false; _workModeAutoDetected = true; _syncFilterButtons(); }
            }
            renderTasks(msg.tasks, msg.lane_counts, msg.canon_summary, msg.sub_lane_labels);
            // 失敗タスクを通知パネルに追加（重複防止）
            const failedTasks = (msg.tasks || []).filter(t => t.cli_failed || t.category === 'cli_failed');
            failedTasks.forEach(ft => {
              const exists = notifications.some(n => n._taskId === ft.id);
              if (!exists) {
                addNotification({
                  type: 'failed',
                  title: ft.title || ft.id,
                  detail: ft.failure_reason || '',
                  time: ft.last_run || '',
                  _taskId: ft.id,
                });
              }
            });
          }

          if (msg.type === 'hub_alert') {
            const tag = msg.tag || '[INFO]';
            const text = msg.text || '';
            showToast(`${tag} ${text}`);
            appendLog('ego', `${tag} ${text}`, 'patrol');
            const nType = tag.includes('FAIL') || tag.includes('ERROR') ? 'alert' : 'info';
            addNotification({
              type: nType,
              title: `${tag} ${text}`,
              time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
            });
          }

          if (msg.type === 'task_status_change') {
            const row = document.querySelector(`.dash-row[data-task-id="${msg.task_id}"]`);
            if (row) {
              if (msg.status === 'running') {
                row.style.borderLeft = '4px solid var(--neon-cyan)';
                row.classList.add('task-running');
              } else if (msg.status === 'completed' || msg.status === 'approved') {
                row.style.opacity = '0.5';
                row.classList.add('task-done');
              } else if (msg.status === 'stopped') {
                row.classList.add('task-stopped');
              }
            }
            showToast(msg.status.toUpperCase() + ': ' + msg.task_id);
          }

          // Phase 2: Confirmation Dialog for task/ADR creation
          if (msg.type === 'confirm_dialog') {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;-webkit-app-region:no-drag';
            overlay.innerHTML = `<div style="background:rgba(0,20,30,0.95);border:1px solid var(--neon-cyan);padding:30px;max-width:400px;text-align:center;border-radius:4px;">
              <div style="color:var(--neon-cyan);margin-bottom:15px;font-size:13px;">${msg.message}</div>
              <div style="display:flex;gap:15px;justify-content:center;">
                <button id="confirm-yes" style="background:var(--neon-cyan);color:#000;border:none;padding:8px 20px;cursor:pointer;">はい</button>
                <button id="confirm-no" style="background:transparent;color:var(--neon-cyan);border:1px solid var(--neon-cyan);padding:8px 20px;cursor:pointer;">いいえ</button>
              </div>
            </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#confirm-yes').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: true }));
              overlay.remove();
            };
            overlay.querySelector('#confirm-no').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: false }));
              overlay.remove();
            };
          }

          if (msg.type === 'tts_error') {
            addThought("TTS ERROR: " + msg.error);
            console.error("TTS Error:", msg.error);
          }
        } catch (err) {
          console.error("WS Parse Error:", err);
        }
      };
      ws.onclose = () => {
        showToast('Canon から切断されました。再接続します…');
        setTimeout(connect, 3000);
      };
      ws.onerror = (err) => {
        console.error("WS Error:", err);
        showToast('音声エンジンに接続できません (port ' + wsPort + ')。simple_chat が起動しているか確認してください。');
      };
    }
    connect();

    // Command Input
    commandInput.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const txt = commandInput.value.trim();
        if (txt && ws && ws.readyState === 1) {
          appendLog('user', txt);
          ws.send(JSON.stringify({ type: 'text_input', text: txt }));
          commandInput.value = '';
        }
      }
    };

    // Mic (Toggle) System
    const micBtn = document.getElementById('micBtn');
    const voiceWave = document.getElementById('voiceWave');
    let isRecording = false;

    function toggleMic() {
      if (!ws || ws.readyState !== 1) return;

      if (!isRecording) {
        // START RECORDING
        isRecording = true;
        micBtn.classList.add('active');
        voiceWave.classList.add('active');
        avatarFrame.classList.add('thinking'); // Feedback
        ws.send(JSON.stringify({ type: 'start_mic' }));
      } else {
        // STOP & PROCESS
        isRecording = false;
        micBtn.classList.remove('active');
        voiceWave.classList.remove('active');
        avatarFrame.classList.remove('thinking');
        ws.send(JSON.stringify({ type: 'stop_mic' }));
      }
    }

    micBtn.onclick = toggleMic;

    // Canon の声 On/Off（マイクの隣）
    let voiceOn = true;
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceBtnSvg = document.getElementById('voiceBtnSvg');
    const voiceSvgOn = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    const voiceSvgOff = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    function updateVoiceButton() {
      voiceBtn.classList.toggle('muted', !voiceOn);
      voiceBtn.title = voiceOn ? 'Canonの声 On（クリックでOff）' : 'Canonの声 Off（クリックでOn）';
      if (voiceBtnSvg) voiceBtnSvg.innerHTML = voiceOn ? voiceSvgOn : voiceSvgOff;
    }
    function toggleVoice() {
      if (!ws || ws.readyState !== 1) return;
      voiceOn = !voiceOn;
      ws.send(JSON.stringify({ type: 'mute', value: !voiceOn }));
      updateVoiceButton();
      showToast(voiceOn ? 'Canonの声: On' : 'Canonの声: Off');
    }
    voiceBtn.onclick = toggleVoice;
    updateVoiceButton();

    // Keyboard PTT (Space) or Toggle (optional)
    window.onkeydown = (e) => {
      if (e.key === '/' && document.activeElement !== commandInput) {
        e.preventDefault();
        commandInput.focus();
      }
      if (e.code === 'Space' && document.activeElement !== commandInput) {
        if (!isRecording) toggleMic();
      }
    };
    window.onkeyup = (e) => {
      // For Toggle Mode, we don't necessarily stop on keyup, 
      // but if the user expects PTT, they'd want it to stop.
      // Given the request "Toggle Mode", ignoring keyup might be safer 
      // OR we support both. Let's stick to Toggle for now as requested.
    };

    window.handleTask = (id, cat, is_work) => {
      const input = document.getElementById('commandInput');
      if (input) {
        const cleanId = id.replace('.md', '').replace(/【.*?】/g, '');
        input.value = cleanId + ' について ';
        input.focus();
      }
    };

    // ===== Bottom Notification Panel =====
    let bottomPanelOpen = false;
    let notifications = [];

    function toggleBottomPanel() {
      bottomPanelOpen = !bottomPanelOpen;
      const panel = document.getElementById('bottomPanel');
      const badge = document.getElementById('notifBadge');
      if (bottomPanelOpen) {
        panel.classList.add('open');
        badge.style.display = 'none';
        notifications.forEach(n => n.read = true);
      } else {
        panel.classList.remove('open');
      }
    }

    function addNotification(item) {
      notifications.unshift(item);
      if (notifications.length > 50) notifications.pop();
      _renderNotifications();
      if (!bottomPanelOpen) {
        const badge = document.getElementById('notifBadge');
        const unread = notifications.filter(n => !n.read).length;
        if (unread > 0) {
          badge.textContent = unread;
          badge.style.display = 'inline-block';
        }
      }
    }

    function clearNotifications() {
      notifications = [];
      _renderNotifications();
      const badge = document.getElementById('notifBadge');
      badge.style.display = 'none';
    }

    function _renderNotifications() {
      const el = document.getElementById('notifContent');
      if (!el) return;
      if (notifications.length === 0) {
        el.innerHTML = '<div class="notif-empty">通知はありません</div>';
        return;
      }
      let html = '';
      notifications.forEach((n, i) => {
        const isFailed = n.type === 'failed' || n.type === 'cli_failed';
        const clickAttr = isFailed ? `onclick="notifClick(${i})" style="cursor:pointer;"` : '';
        const tagClass = isFailed ? 'notif-tag-failed' : (n.type === 'alert' ? 'notif-tag-alert' : 'notif-tag-info');
        const tagLabel = isFailed ? 'Canon 実行失敗' : (n.type === 'alert' ? 'ALERT' : 'INFO');
        html += `<div class="notif-item ${isFailed ? 'notif-clickable' : ''}" ${clickAttr}>`;
        html += `<span class="notif-tag ${tagClass}">${tagLabel}</span>`;
        html += `<div class="notif-body">`;
        html += `<div class="notif-title">${escapeHtml(n.title || '')}</div>`;
        if (n.detail) html += `<div class="notif-detail">${escapeHtml(n.detail)}</div>`;
        if (n.time) html += `<div class="notif-time">${escapeHtml(n.time)}</div>`;
        html += `</div></div>`;
      });
      el.innerHTML = html;
    }

    function notifClick(idx) {
      const n = notifications[idx];
      if (!n) return;
      n.read = true;
      const input = document.getElementById('commandInput');
      if (input) {
        const cleanTitle = (n.title || '').replace('.md', '').replace(/【.*?】/g, '');
        input.value = cleanTitle + ' の失敗原因について ';
        input.focus();
      }
      _renderNotifications();
    }

    // Electron Controls
    try {
      const { ipcRenderer } = window.require('electron');
      document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-window');
      document.getElementById('max-btn').onclick = () => ipcRenderer.send('maximize-window');
      document.getElementById('close-btn').onclick = () => window.close();
    } catch (e) { }

    // Polling Metrics
    setInterval(() => {
      fetch('http://localhost:8000/metrics').then(r => r.json()).then(m => {
        setStateValue('val-cpu', m.cpu_percent + '%');
        setStateValue('val-mem', m.memory_percent + '%');
      }).catch(e => { });
    }, 5000);
  </script>
</body>

</html>
