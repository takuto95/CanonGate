<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CanonGate HUD</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="hud-container">
    <div class="win-ctrl">
      <button id="min-btn">ー</button>
      <button id="max-btn">▢</button>
      <button id="close-btn">×</button>
    </div>

    <!-- 
    <header class="hud-header">
       ... (Hidden as requested) ...
    </header> 
    -->

    <div class="hud-main-layout">
      <!-- Left: Intelligence Stream -->
      <aside class="hud-wing left-wing">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 15px;">INTELLIGENCE_STREAM</div>
        <div class="stream-filters">
          <button class="filter-btn active" onclick="setFilter('all')">全て</button>
          <button class="filter-btn" onclick="setFilter('chat')">対話</button>
          <button class="filter-btn" onclick="setFilter('soliloquy')">独り言</button>
          <button class="filter-btn" onclick="setFilter('patrol')">巡回</button>
        </div>
        <div id="chatStream" class="chat-stream"></div>
        <div id="thoughtStream" class="thought-stream"></div>
      </aside>

      <!-- Center: Avatar Core -->
      <main class="center-core">
        <div class="avatar-frame" id="avatarFrame">
          <iframe id="mascotFrame" src="../mascot-web/index.html?mode=viewer" frameborder="0" scrolling="no"
            style="width:100%; height:100%; border:none; pointer-events: none;"></iframe>
        </div>
        <div style="font-size: 11px; letter-spacing: 4px; color: var(--neon-cyan); opacity: 0.7;">CANON_SYSTEM</div>
        <div class="hud-command-area" style="flex-direction: column;">
          <div class="voice-wave-container" id="voiceWave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
            <button class="voice-btn mic-btn" id="voiceBtn" title="Canonの声 On/Off">
              <svg viewBox="0 0 24 24" id="voiceBtnSvg">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
              </svg>
            </button>
            <button class="mic-btn" id="micBtn">
              <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                  d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
              </svg>
            </button>
            <input type="text" id="commandInput" placeholder="ENTER_COMMAND_OR_VOICE..." autocomplete="off">
          </div>
        </div>
      </main>

      <!-- Right: Mission/Task Dash (toggleable) -->
      <aside class="hud-wing right-wing">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">MISSION_RADAR</div>
          <div class="stream-filters" style="margin-bottom: 0; display: flex; align-items: center; gap: 8px;">
            <button class="filter-btn active" id="btn-private" onclick="setWorkFilter(false)">生活</button>
            <button class="filter-btn" id="btn-work" onclick="setWorkFilter(true)">仕事</button>
            <select id="task-sort-select" onchange="setTaskSort(this.value)"
              style="background: rgba(0,20,30,0.9); color: var(--neon-cyan); border: 1px solid rgba(0,255,255,0.25); padding: 4px 6px; font-size: 11px;">
              <option value="priority" selected>優先順</option>
              <option value="project">PJ順</option>
              <option value="title">名前順</option>
            </select>
            <button id="sync-btn" onclick="syncTasks()" title="SYNC_BRAIN"
              style="background:none; border:none; color:var(--neon-cyan); cursor:pointer; font-size:12px; opacity:0.6; padding:0; display:flex; align-items:center; transition: all 0.2s;">🔄</button>
            <button id="task-panel-close-btn" onclick="toggleTaskPanel(false)" title="パネルを閉じる"
              style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px; padding:0 4px; line-height:1;">◀</button>
          </div>
        </div>
        <div class="task-panel-inner">
        <div id="taskDash" style="flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;">
          <div id="taskDashContent"></div>
        </div>
        </div>
      </aside>
      <!-- Tab to open panel when closed -->
      <button type="button" class="task-panel-tab" id="task-panel-tab" onclick="toggleTaskPanel(true)" aria-label="タスクパネルを開く">MISSION</button>
    </div>

    <div id="toast" class="toast">NOTIFICATION</div>
  </div>

  <script>
    const mascotFrame = document.getElementById('mascotFrame');
    const avatarFrame = document.getElementById('avatarFrame');
    const commandInput = document.getElementById('commandInput');
    const chatStream = document.getElementById('chatStream');
    const thoughtStream = document.getElementById('thoughtStream');
    const taskDash = document.getElementById('taskDash');
    const toast = document.getElementById('toast');
    const hudMainLayout = document.querySelector('.hud-main-layout');

    // Default: task panel closed (hidden). Open = full-window task view.
    if (hudMainLayout) hudMainLayout.classList.add('task-panel-closed');

    function toggleTaskPanel(open) {
      if (!hudMainLayout) return;
      if (open) hudMainLayout.classList.remove('task-panel-closed');
      else hudMainLayout.classList.add('task-panel-closed');
    }

    function showToast(txt) {
      toast.textContent = txt;
      toast.classList.add('active');
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    // State labels
    function setStateValue(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    // Append logs
    let currentFilter = 'all';
    function appendLog(who, text, tag = 'chat') {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'chat-msg ' + who + ' tag-' + tag;
      div.textContent = text;
      div.dataset.tag = tag;

      // Filter logic
      if (currentFilter !== 'all' && currentFilter !== tag) {
        div.style.display = 'none';
      }

      chatStream.appendChild(div);
      chatStream.scrollTop = chatStream.scrollHeight;

      if (who === 'ego') {
        avatarFrame.classList.add('speaking');
        setTimeout(() => avatarFrame.classList.remove('speaking'), 2000);
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(filter));
      });

      document.querySelectorAll('.chat-msg').forEach(msg => {
        if (filter === 'all' || msg.dataset.tag === filter) {
          msg.style.display = 'block';
        } else {
          msg.style.display = 'none';
        }
      });
    }

    let workMode = false;
    let taskSortMode = 'priority';
    function setWorkFilter(isWork) {
      workMode = isWork;
      document.getElementById('btn-work').classList.toggle('active', isWork);
      document.getElementById('btn-private').classList.toggle('active', !isWork);
      renderTasks(lastTasks);
    }
    function setTaskSort(mode) {
      taskSortMode = mode || 'priority';
      renderTasks(lastTasks);
    }

    let lastTasks = [];
    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function getPhaseLabel(c) {
      return c === 'ego_proposal' ? '実行前' : (c === 'user_decision' ? '判断' : (c === 'ego_running' ? '実行中(E)' : (c === 'user_running' ? '実行中(U)' : '要整理')));
    }
    function getCategorySortRank(category) {
      const ranks = {
        user_decision: 0,
        ego_proposal: 1,
        needs_org: 2,
        ego_running: 3,
        user_running: 4,
      };
      return Object.prototype.hasOwnProperty.call(ranks, category) ? ranks[category] : 9;
    }
    function getPrioritySortRank(task) {
      return Number.isFinite(task.priority_rank) ? task.priority_rank : 999;
    }
    function compareTasks(a, b) {
      if (taskSortMode === 'title') {
        return (a.title || '').localeCompare(b.title || '', 'ja');
      }

      if (taskSortMode === 'project') {
        const byProject = (a.project || '').localeCompare(b.project || '', 'ja');
        if (byProject !== 0) return byProject;
      }

      const byPriority = getPrioritySortRank(a) - getPrioritySortRank(b);
      if (byPriority !== 0) return byPriority;

      const byCategory = getCategorySortRank(a.category) - getCategorySortRank(b.category);
      if (byCategory !== 0) return byCategory;

      return (a.title || '').localeCompare(b.title || '', 'ja');
    }
    function renderTasks(tasks) {
      lastTasks = tasks;
      const container = document.getElementById('taskDashContent');
      if (!container) return;

      const filtered = tasks.filter(t => (workMode ? t.is_work : !t.is_work));
      const renderTaskTable = (list) => {
        let html = '<table class="task-table"><thead><tr><th class="col-phase">フェーズ</th><th class="col-title">タスク名</th><th class="col-priority">優先</th><th class="col-status">タスク済</th><th class="col-cli">CLI</th><th class="col-eval">評価</th></tr></thead><tbody>';
        list.forEach(t => {
          const c = t.category;
          const phaseLabel = getPhaseLabel(c);
          const taskDone = true;
          const cliDone = t.cli_executed === true;
          const cliFailed = t.cli_failed === true;
          const evalDone = t.evaluated === true || t.folder === 'evaluating';
          const titleSafe = escapeHtml(t.title);
          const prioritySafe = escapeHtml(t.priority_label || '');
          const cliCell = cliDone ? '<span class="task-cell done">○</span>' : (cliFailed ? '<span class="task-cell failed" title="CLI実行で失敗">×</span>' : '<span class="task-cell pending">−</span>');
          const priorityCell = prioritySafe ? `<span class="task-cell">${prioritySafe}</span>` : '<span class="task-cell pending">−</span>';
          html += `<tr class="dash-row ${c} task-row-clickable" data-task-id="${escapeHtml(t.id)}" data-category="${c}" data-is-work="${t.is_work}">`
            + `<td class="col-phase">${phaseLabel}</td>`
            + `<td class="col-title">${titleSafe}</td>`
            + `<td class="col-priority">${priorityCell}</td>`
            + `<td class="col-status">${taskDone ? '<span class="task-cell done">○</span>' : '<span class="task-cell">−</span>'}</td>`
            + `<td class="col-cli">${cliCell}</td>`
            + `<td class="col-eval">${evalDone ? '<span class="task-cell done">○</span>' : '<span class="task-cell pending">−</span>'}</td>`
            + `</tr>`;
        });
        html += '</tbody></table>';
        return html;
      };

      if (taskSortMode === 'priority') {
        const sorted = [...filtered].sort(compareTasks);
        container.innerHTML = `<div class="dash-category project-section"><div class="dash-category-header project-header">優先順</div>${renderTaskTable(sorted)}</div>`;
      } else {
      const byProject = {};
      filtered.forEach(t => {
        const p = (t.project && t.project.trim()) ? t.project.trim() : 'その他';
        if (!byProject[p]) byProject[p] = [];
        byProject[p].push(t);
      });
      Object.keys(byProject).forEach(projectName => {
        byProject[projectName].sort(compareTasks);
      });
      const projectOrder = Object.keys(byProject).sort((a, b) => {
        if (taskSortMode === 'title') return a.localeCompare(b, 'ja');
        if (taskSortMode === 'project') return a.localeCompare(b, 'ja');
        return compareTasks(byProject[a][0], byProject[b][0]) || a.localeCompare(b, 'ja');
      });

      let html = '';
      projectOrder.forEach(projectName => {
        const list = byProject[projectName];
        html += `<div class="dash-category project-section"><div class="dash-category-header project-header">${escapeHtml(projectName)}</div>`;
        html += `${renderTaskTable(list)}</div>`;
      });
        container.innerHTML = html;
      }

      container.querySelectorAll('.task-row-clickable').forEach(tr => {
        tr.addEventListener('click', function() {
          const id = this.getAttribute('data-task-id');
          const cat = this.getAttribute('data-category');
          const isWork = this.getAttribute('data-is-work') === 'true';
          if (id && cat != null) handleTask(id, cat, isWork);
        });
      });

      if (tasks.some(t => t.category === 'user_decision')) {
        avatarFrame.style.borderColor = '#ff9d00';
        avatarFrame.style.boxShadow = '0 0 15px rgba(255,157,0,0.3)';
      } else {
        avatarFrame.style.borderColor = '';
        avatarFrame.style.boxShadow = '';
      }
    }

    function addThought(txt) {
      const div = document.createElement('div');
      const isSystem = txt.startsWith('SYSTEM') || txt.startsWith('[HUB]');
      div.className = 'thought-msg' + (isSystem ? ' system' : '');
      div.textContent = '> ' + txt;
      thoughtStream.prepend(div);
      if (thoughtStream.children.length > 40) thoughtStream.lastElementChild.remove();
    }

    // Audio System (ADR-0114)
    let audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.error("Web Audio API not supported");
    }

    let audioQueue = [];
    let isPlaying = false;

    async function decodeAndPlay(base64Data, format = 'mp3') {
      if (!audioCtx) return;
      try {
        const mime = format === 'wav' ? 'audio/wav' : 'audio/mp3';
        const resp = await fetch(`data:${mime};base64,${base64Data}`);
        const arrayBuffer = await resp.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioQueue.push(audioBuffer);

        // Show audio activity in UI
        const statusEl = document.getElementById('val-status');
        if (statusEl && statusEl.textContent === 'LISTENING') statusEl.textContent = 'SPEAKING'; // Added null check for statusEl

        if (!isPlaying) playNext();
      } catch (e) {
        console.error("Audio Decode Error:", e);
        addThought("Audio Error: " + e.message);
      }
    }

    function playNext() {
      if (!audioCtx || audioQueue.length === 0) {
        isPlaying = false;
        return;
      }
      isPlaying = true;
      const buffer = audioQueue.shift();
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.onended = playNext;
      source.start();
    }

    function syncTasks() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'refresh_tasks' }));
        const btn = document.getElementById('sync-btn');
        btn.style.transform = 'rotate(360deg)';
        btn.style.opacity = '1';
        setTimeout(() => {
          btn.style.transform = 'rotate(0deg)';
          btn.style.opacity = '0.6';
        }, 1000);
      }
    }

    const unlockAudio = () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
          console.log("AudioContext resumed");
          addThought("Audio system online.");
        });
      }
      if (mascotFrame && mascotFrame.contentWindow) {
        mascotFrame.contentWindow.postMessage({ type: 'resume_audio' }, '*');
      }
    };
    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('keydown', unlockAudio, { once: true });
    window.addEventListener('touchstart', unlockAudio, { once: true });

    // WebSocket Logic（ポートは Commander API から取得、未取得時は 8082）
    let ws = null;
    let wsPort = 8082;
    async function connect() {
      try {
        const cfg = await fetch('http://localhost:8000/api/canon-gate-config').then(r => r.json()).catch(() => ({}));
        if (cfg.ws_port) wsPort = cfg.ws_port;
      } catch (e) { }
      const url = 'ws://localhost:' + wsPort + '/ws';
      ws = new WebSocket(url);
      ws.onopen = () => {
        showToast('Canon に接続しました');
        addThought('SYSTEM: Canon (音声) に接続しました');
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);

          if (msg.type === 'audio') decodeAndPlay(msg.data, msg.format);

          if (msg.type === 'state') {
            setStateValue('ego-state', msg.state.toUpperCase());
            // Sync to Mascot Frame
            if (mascotFrame && mascotFrame.contentWindow) {
              mascotFrame.contentWindow.postMessage({ type: 'state', state: msg.state }, '*');
            }
            // Local visual feedback
            if (msg.state === 'speaking') {
              avatarFrame.classList.add('speaking');
              avatarFrame.classList.remove('thinking');
            } else if (msg.state === 'thinking' || msg.state === 'transcribing') {
              avatarFrame.classList.add('thinking');
              avatarFrame.classList.remove('speaking');
            } else {
              avatarFrame.classList.remove('speaking');
              avatarFrame.classList.remove('thinking');
            }
          }

          if (msg.type === 'chat') {
            appendLog(msg.who, msg.text, msg.tag || 'chat');
          }

          if (msg.type === 'thought') addThought(msg.text);

          if (msg.type === 'level_data') {
            setStateValue('val-lvl', msg.lvl);
            const xpBar = document.getElementById('bar-xp');
            if (xpBar) xpBar.style.width = msg.xp_percent + '%';
          }

          if (msg.type === 'state_change') {
            if (typeof voiceOn !== 'undefined') {
              voiceOn = (msg.state !== 'muted');
              updateVoiceButton();
            }
          }

          if (msg.type === 'tasks') renderTasks(msg.tasks);

          if (msg.type === 'hub_alert') {
            const tag = msg.tag || '[INFO]';
            const text = msg.text || '';
            showToast(`${tag} ${text}`);
            appendLog('ego', `${tag} ${text}`, 'patrol');
          }

          if (msg.type === 'task_status_change') {
            const row = document.querySelector(`.dash-row[data-task-id="${msg.task_id}"]`);
            if (row) {
              if (msg.status === 'running') {
                row.style.borderLeft = '4px solid var(--neon-cyan)';
                row.classList.add('task-running');
              } else if (msg.status === 'completed' || msg.status === 'approved') {
                row.style.opacity = '0.5';
                row.classList.add('task-done');
              } else if (msg.status === 'stopped') {
                row.classList.add('task-stopped');
              }
            }
            showToast(msg.status.toUpperCase() + ': ' + msg.task_id);
          }

          // Phase 2: Confirmation Dialog for task/ADR creation
          if (msg.type === 'confirm_dialog') {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;-webkit-app-region:no-drag';
            overlay.innerHTML = `<div style="background:rgba(0,20,30,0.95);border:1px solid var(--neon-cyan);padding:30px;max-width:400px;text-align:center;border-radius:4px;">
              <div style="color:var(--neon-cyan);margin-bottom:15px;font-size:13px;">${msg.message}</div>
              <div style="display:flex;gap:15px;justify-content:center;">
                <button id="confirm-yes" style="background:var(--neon-cyan);color:#000;border:none;padding:8px 20px;cursor:pointer;">はい</button>
                <button id="confirm-no" style="background:transparent;color:var(--neon-cyan);border:1px solid var(--neon-cyan);padding:8px 20px;cursor:pointer;">いいえ</button>
              </div>
            </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#confirm-yes').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: true }));
              overlay.remove();
            };
            overlay.querySelector('#confirm-no').onclick = () => {
              ws.send(JSON.stringify({ type: 'confirm_action', action_id: msg.action_id, confirmed: false }));
              overlay.remove();
            };
          }

          if (msg.type === 'tts_error') {
            addThought("TTS ERROR: " + msg.error);
            console.error("TTS Error:", msg.error);
          }
        } catch (err) {
          console.error("WS Parse Error:", err);
        }
      };
      ws.onclose = () => {
        showToast('Canon から切断されました。再接続します…');
        setTimeout(connect, 3000);
      };
      ws.onerror = (err) => {
        console.error("WS Error:", err);
        showToast('音声エンジンに接続できません (port ' + wsPort + ')。simple_chat が起動しているか確認してください。');
      };
    }
    connect();

    // Command Input
    commandInput.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const txt = commandInput.value.trim();
        if (txt && ws && ws.readyState === 1) {
          appendLog('user', txt);
          ws.send(JSON.stringify({ type: 'text_input', text: txt }));
          commandInput.value = '';
        }
      }
    };

    // Mic (Toggle) System
    const micBtn = document.getElementById('micBtn');
    const voiceWave = document.getElementById('voiceWave');
    let isRecording = false;

    function toggleMic() {
      if (!ws || ws.readyState !== 1) return;

      if (!isRecording) {
        // START RECORDING
        isRecording = true;
        micBtn.classList.add('active');
        voiceWave.classList.add('active');
        avatarFrame.classList.add('thinking'); // Feedback
        ws.send(JSON.stringify({ type: 'start_mic' }));
      } else {
        // STOP & PROCESS
        isRecording = false;
        micBtn.classList.remove('active');
        voiceWave.classList.remove('active');
        avatarFrame.classList.remove('thinking');
        ws.send(JSON.stringify({ type: 'stop_mic' }));
      }
    }

    micBtn.onclick = toggleMic;

    // Canon の声 On/Off（マイクの隣）
    let voiceOn = true;
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceBtnSvg = document.getElementById('voiceBtnSvg');
    const voiceSvgOn = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    const voiceSvgOff = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    function updateVoiceButton() {
      voiceBtn.classList.toggle('muted', !voiceOn);
      voiceBtn.title = voiceOn ? 'Canonの声 On（クリックでOff）' : 'Canonの声 Off（クリックでOn）';
      if (voiceBtnSvg) voiceBtnSvg.innerHTML = voiceOn ? voiceSvgOn : voiceSvgOff;
    }
    function toggleVoice() {
      if (!ws || ws.readyState !== 1) return;
      voiceOn = !voiceOn;
      ws.send(JSON.stringify({ type: 'mute', value: !voiceOn }));
      updateVoiceButton();
      showToast(voiceOn ? 'Canonの声: On' : 'Canonの声: Off');
    }
    voiceBtn.onclick = toggleVoice;
    updateVoiceButton();

    // Keyboard PTT (Space) or Toggle (optional)
    window.onkeydown = (e) => {
      if (e.key === '/' && document.activeElement !== commandInput) {
        e.preventDefault();
        commandInput.focus();
      }
      if (e.code === 'Space' && document.activeElement !== commandInput) {
        if (!isRecording) toggleMic();
      }
    };
    window.onkeyup = (e) => {
      // For Toggle Mode, we don't necessarily stop on keyup, 
      // but if the user expects PTT, they'd want it to stop.
      // Given the request "Toggle Mode", ignoring keyup might be safer 
      // OR we support both. Let's stick to Toggle for now as requested.
    };

    window.handleTask = (id, cat, is_work) => {
      if (ws && ws.readyState === 1) {
        const payload = (type) => ({ type, task_id: id, is_work: !!is_work });
        if (cat === 'user_decision') ws.send(JSON.stringify(payload('task_approve')));
        else if (cat === 'ego_running') ws.send(JSON.stringify(payload('task_stop')));
        else if (cat === 'user_running') ws.send(JSON.stringify(payload('task_complete')));
        else ws.send(JSON.stringify(payload('task_execute')));
        showToast('SEND_COMMAND: ' + id);
      }
    };

    // Electron Controls
    try {
      const { ipcRenderer } = window.require('electron');
      document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-window');
      document.getElementById('max-btn').onclick = () => ipcRenderer.send('maximize-window');
      document.getElementById('close-btn').onclick = () => window.close();
    } catch (e) { }

    // Polling Metrics
    setInterval(() => {
      fetch('http://localhost:8000/metrics').then(r => r.json()).then(m => {
        setStateValue('val-cpu', m.cpu_percent + '%');
        setStateValue('val-mem', m.memory_percent + '%');
      }).catch(e => { });
    }, 5000);
  </script>
</body>

</html>
